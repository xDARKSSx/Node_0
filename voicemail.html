<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovered Audio — Internal Extension 4471</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body{
      font-family:'Courier New', monospace;
      background:#0a0a0a;
      color:#c9c9c9;
      display:flex;
      justify-content:center;
      padding:40px 20px;
  }
  #container{ width:100%; max-width:640px; margin-top:40px; }
  h1{ font-size:16px; color:#ff9f4a; letter-spacing:1px; margin-bottom:4px; }
  .meta{ font-size:12px; opacity:0.55; margin-bottom:30px; }

  #locked{ text-align:center; opacity:0.6; margin-top:60px; }

  #player{ display:none; }
  #waveform{
      width:100%; height:80px;
      background:#111;
      border:1px solid #ff9f4a33;
      display:block;
  }
  #controls{ margin-top:14px; display:flex; align-items:center; gap:14px; }
  #playBtn{
      background:#1a1a1a; color:#ff9f4a; border:1px solid #ff9f4a55;
      padding:10px 18px; font-family:inherit; font-size:13px; cursor:pointer;
      letter-spacing:1px;
  }
  #playBtn:hover{ background:#ff9f4a15; }
  #playBtn:disabled{ opacity:0.4; cursor:default; }
  #timeDisplay{ font-size:12px; opacity:0.6; }

  #transcript{
      margin-top:26px;
      border-top:1px solid #333;
      padding-top:20px;
  }
  #transcript p{
      margin:10px 0;
      opacity:0;
      transform:translateY(4px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      font-size:14px;
      line-height:1.6;
  }
  #transcript p.visible{ opacity:1; transform:translateY(0); }
  #transcript .speaker{ color:#ff9f4a; font-weight:bold; }
  #transcript .system{ color:#777; font-style:italic; }
</style>
</head>
<body>

<div id="container">
  <div id="locked">
    <p>[ file not found ]</p>
  </div>

  <div id="player">
    <h1>RECOVERED AUDIO — INTERNAL EXTENSION 4471</h1>
    <div class="meta">Source: voicemail archive · Integrity: partial · Duration: 01:35</div>

    <canvas id="waveform" width="640" height="80"></canvas>

    <div id="controls">
      <button id="playBtn">▶ PLAY RECORDING</button>
      <span id="timeDisplay">00:00 / 01:35</span>
    </div>

    <div id="transcript"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="engine.js"></script>
<script src="voicemail.js"></script>
</body>
</html>
