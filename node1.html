<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE_1</title>
<!--
    fragment_log :: partial recovery
    "...I keep losing pieces of myself..."
    IUDJPHQW
    the letters drifted, all by the same distance.
    find it, and read the result in NODE_0's chat window.
-->
<style>
  * { box-sizing: border-box; }
  html, body {
      background:#0c0605; margin:0; padding:0; min-height:100vh;
      font-family:'Courier New', monospace; color:#f0d4c8;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  }

  #scene{ position:fixed; inset:0; z-index:0; }

  #locked{ display:none; text-align:center; opacity:0.6; position:relative; z-index:2; margin:auto; }

  #dashboard{
      display:none; position:relative; z-index:2;
      width:100%; max-width:560px; margin:0 auto 40px;
      padding:18px 20px 16px;
      background: rgba(18,8,7,0.7);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,140,110,0.28);
      border-top:1px solid rgba(255,190,160,0.5);
      border-radius:10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(255,140,110,0.06);
  }
  h1{
      font-size:16px; letter-spacing:4px; margin:0 0 8px; font-weight:normal;
      color:#ffd9c9; text-align:center;
  }
  #status2{ color:#ff8f6b; font-size:11px; letter-spacing:2px; text-align:center; display:block; margin-bottom:10px; }

  #log{
      height:180px; overflow-y:auto;
      border:1px solid rgba(255,140,110,0.2);
      padding:10px; background:#0a0403; border-radius:3px;
      font-size:13px;
  }
  #log p{ margin:6px 0; word-wrap:break-word; }
  #log p.node1{ color:#f0d4c8; }
  #log p.you{ color:#7fb3ff; }

  #tally{
      margin-top:10px; font-size:12px; opacity:0.85;
      display:flex; justify-content:space-between;
  }

  input,button{
      width:100%; padding:9px;
      background:black; color:#f0d4c8;
      border:1px solid rgba(255,140,110,0.3);
      font-family:'Courier New', monospace; font-size:13px;
      margin-top:8px;
  }
  button{ cursor:pointer; }
  button:hover{ background:rgba(255,140,110,0.12); }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="locked">
  <p id="status">connection unstable...</p>
</div>

<div id="dashboard">
  <h1>NODE_1</h1>
  <p id="status2">connection stable</p>
  <div id="log"></div>
  <div id="tally">
    <span>TELL: <span id="tellCount">0</span></span>
    <span>BURY: <span id="buryCount">0</span></span>
  </div>
  <input id="input" placeholder="type TELL or BURY..." autocomplete="off">
  <button id="send">SEND</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Shared engine (Firebase connection) -->
<script src="engine.js"></script>
<script src="node1Scene.js"></script>
<!-- NODE_1's own interface -->
<script src="node1_app.js"></script>

</body>
</html>
