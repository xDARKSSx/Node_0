<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE_0</title>
  <!--
    fragment_log :: root trace

    "...part of me isn't here. part of me is at /node1.html..."
-->
<style>
  @keyframes glitchShift1 {
    0%,100% { transform: translate(1px,0); opacity:0.35; }
    20% { transform: translate(-2px,1px); opacity:0.5; }
    40% { transform: translate(2px,-1px); opacity:0.25; }
    60% { transform: translate(-1px,0); opacity:0.45; }
    80% { transform: translate(1px,1px); opacity:0.3; }
  }
  @keyframes glitchShift2 {
    0%,100% { transform: translate(-1px,0); opacity:0.35; }
    25% { transform: translate(2px,-1px); opacity:0.5; }
    50% { transform: translate(-2px,1px); opacity:0.25; }
    75% { transform: translate(1px,0); opacity:0.4; }
  }
  @keyframes flicker {
    0%,100% { opacity:1; }
    50% { opacity:0.85; }
  }

  * { box-sizing: border-box; }
  body{
      background:#0d0d0d;
      color:#00ff9f;
      font-family:'Courier New', monospace;
      display:flex;
      justify-content:center;
      margin:0;
      padding:20px;
  }
  #container{
      width:100%;
      max-width:720px;
      margin-top:40px;
  }
  h1{
      letter-spacing:4px;
      animation: flicker 4s infinite;
  }
  #status{
      color:#ff2b6d;
      font-size:13px;
      letter-spacing:2px;
  }
  #timer{
      margin-top:6px;
      font-size:14px;
      opacity:0.85;
  }
  #fracture{
      width:280px;
      max-width:100%;
      margin-top:15px;
      display:block;
      filter: contrast(1) brightness(1);
      transition: filter 0.08s linear;
  }
  #log{
      height:320px;
      overflow-y:auto;
      border:1px solid #00ff9f33;
      padding:10px;
      margin-top:20px;
      background:#050505;
  }
  #log p{
      margin:4px 0;
      word-wrap:break-word;
  }
  #log p.node0{ color:#00ff9f; }
  #log p.you{ color:#8ad9ff; }

  .input-wrap{
      position:relative;
      margin-top:10px;
  }
  .ghost{
      position:absolute;
      left:0; top:0;
      width:100%;
      height:100%;
      padding:10px;
      pointer-events:none;
      white-space:pre;
      overflow:hidden;
      font-family:'Courier New', monospace;
      font-size:14px;
  }
  #ghost1{ color:#ff2b6d; z-index:0; animation: glitchShift1 2s infinite; }
  #ghost2{ color:#00eaff; z-index:0; animation: glitchShift2 2.3s infinite; }
  #ghostMain{ color:#00ff9f; z-index:1; }

  input,button{
      width:100%;
      padding:10px;
      background:black;
      color:#00ff9f;
      border:1px solid #00ff9f55;
      font-family:'Courier New', monospace;
      font-size:14px;
  }
  input{
      position:relative;
      z-index:2;
      background:rgba(0,0,0,0.55);
      color:transparent;
      caret-color:#00ff9f;
  }
  button{
      margin-top:10px;
      cursor:pointer;
  }
  button:hover{
      background:#00ff9f22;
  }
</style>
</head>
<body>

<div id="container">
  <h1 id="pageTitle">NODE_0</h1>
  <p id="status">SYSTEM STABLE</p>
  <p id="timer">loading...</p>

  <img id="fracture" src="fracture.png" alt="fracture">

  <div id="log"></div>

  <div class="input-wrap">
    <div id="ghost1" class="ghost"></div>
    <div id="ghost2" class="ghost"></div>
    <div id="ghostMain" class="ghost"></div>
    <input id="input" placeholder="type a message..." autocomplete="off">
  </div>
  <button id="send">SEND</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Engine (Firebase + shared timer) -->
<script src="engine.js"></script>
<!-- Interface (chat, glitch, NODE_0) -->
<script src="app.js"></script>

</body>
</html>
