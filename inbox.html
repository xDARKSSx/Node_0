<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Mail — Meridian Dynamics Group</title>
<link rel="stylesheet" href="style.css">
<style>
  #mailApp{ display:none; max-width:900px; margin:0 auto; padding:30px 20px; }
  #locked{ text-align:center; margin-top:100px; opacity:0.6; }
  .mail-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .mail-toolbar h2{ margin:0; }
  .mail-count{ font-size:12px; color:#888; }
  #mailList{ background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.08); overflow:hidden; }
  .mail-row{ padding:12px 16px; border-bottom:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; gap:10px; }
  .mail-row:hover{ background:#f4f6f9; }
  .mail-row .from{ font-weight:bold; font-size:13px; color:#1a1f2b; width:180px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mail-row .subject{ font-size:13px; color:#444; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mail-row .date{ font-size:11px; color:#999; flex-shrink:0; }
  .mail-row.special .subject{ color:#1a1f2b; }
  #reader{ display:none; background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.08); padding:24px; margin-top:16px; }
  #reader h3{ color:#0b1a3a; }
  #reader .meta{ font-size:12px; color:#888; margin:6px 0 16px; }
  #backBtn{ background:none; border:none; color:#1a56db; cursor:pointer; font-size:13px; margin-bottom:14px; padding:0; }
  audio{ width:100%; margin-top:14px; }
  #wave{ width:100%; height:60px; background:#0b1a3a; border-radius:6px; margin-top:14px; }
</style>
</head>
<body>

<nav>
  <div class="logo">MERIDIAN DYNAMICS GROUP</div>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="team.html">Team</a>
    <a href="research.html">Research</a>
    <a href="contact.html">Contact</a>
    <a href="inbox.html" class="active" id="navMail">Mail</a>
    <a href="researchers.html">Researchers</a>
    <a href="archive.html" id="navArchive" style="display:none;">Archive</a>
  </div>
</nav>

<div id="locked">
  <p>Internal mail requires an active session token.</p>
</div>

<div id="mailApp">
  <div class="mail-toolbar">
    <h2>Internal Mail — Shared Archive</h2>
    <span class="mail-count" id="mailCount"></span>
  </div>
  <div id="mailList"></div>

  <div id="reader">
    <button id="backBtn">&larr; Back to inbox</button>
    <h3 id="readerSubject"></h3>
    <div class="meta" id="readerMeta"></div>
    <div id="readerBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="engine.js"></script>
<script src="mailNotify.js"></script>
<script src="inbox.js"></script>
<script src="main.js"></script>
</body>
</html>
