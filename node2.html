<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE_2</title>
<style>
  * { box-sizing: border-box; }
  body{
      background:#0d0605;
      color:#e8c79a;
      font-family:'Courier New', monospace;
      display:flex;
      justify-content:center;
      margin:0;
      padding:20px;
  }
  #container{
      width:100%;
      max-width:720px;
      margin-top:50px;
  }
  h1{
      letter-spacing:6px;
      font-weight:normal;
      color:#ff6a3d;
  }
  #locked{ opacity:0.6; }

  #dossier{ display:none; }
  #log{
      min-height:260px;
      border:1px solid #ff6a3d33;
      padding:14px;
      margin-top:20px;
      background:#0a0403;
      line-height:1.7;
  }
  #log p{ margin:6px 0; word-wrap:break-word; }
  #log p.sys{ color:#e8c79a; }
  #log p.you{ color:#7fb3ff; }
  .redacted{
      background:#000;
      color:#000;
      padding:1px 4px;
      cursor:pointer;
      transition: color 0.2s;
  }
  .redacted:hover{ color:#ff6a3d; }

  input,button{
      width:100%;
      padding:10px;
      background:#0a0403;
      color:#e8c79a;
      border:1px solid #ff6a3d40;
      font-family:'Courier New', monospace;
      font-size:14px;
      margin-top:10px;
  }
  button{ cursor:pointer; }
  button:hover{ background:#ff6a3d15; }
</style>
</head>
<body>

<div id="container">
  <h1>NODE_2</h1>

  <div id="locked">
    <p>ACCESS DENIED — insufficient clearance.</p>
  </div>

  <div id="dossier">
    <p style="opacity:0.7;">SUBJECT FILE — AUTOMATED OBSERVATION LOG</p>
    <div id="log"></div>
    <input id="input" placeholder="your answer..." autocomplete="off">
    <button id="send">SEND</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="engine.js"></script>
<script src="node2_app.js"></script>

</body>
</html>
