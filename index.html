<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 720px;
    margin-top: 60px;
}

.glitch {
    display: inline-block;
}

#status {
    margin-top: 10px;
}

#timer {
    margin-top: 10px;
    font-size: 18px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
}

img {
    margin-top: 20px;
    width: 320px;
    border: 1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer"></p>

<img src="./fracture.png" id="fracture" onerror="this.style.display='none'">

<div id="log"></div>

</div>

<script>

// =========================
// TIMER FIXE ARG (30 JOURS)
// =========================

// OPTION PROPRE ARG : date fixe globale
const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const timer = document.getElementById("timer");
    if(!timer) return;

    const now = Date.now();
    const diff = END - now;

    if(diff <= 0){
        timer.innerText = "NODE_0 ACTIVE";
        return;
    }

    const totalSeconds = Math.floor(diff / 1000);

    const d = Math.floor(totalSeconds / 86400);
    const h = Math.floor((totalSeconds % 86400) / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    timer.innerText =
        `${d}d ${String(h).padStart(2,"0")}:` +
        `${String(m).padStart(2,"0")}:` +
        `${String(s).padStart(2,"0")}`;
}

setInterval(updateTimer, 1000);
updateTimer();


// =========================
// GLITCH ENGINE
// =========================

const symbols = ["█","#","%","&","@","Ø","Ξ","Δ","?","$"];

function r(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function glitch(el, intensity = 0.3){

    if(!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    const words = original.split(" ");

    const out = words.map(w => {

        if(Math.random() < intensity){

            let c = "";
            const len = Math.max(2, w.length);

            for(let i = 0; i < len; i++){
                c += r(symbols);
            }

            return c;
        }

        return w;
    });

    el.innerText = out.join(" ");

    setTimeout(()=>{
        el.innerText = original;
    }, 150 + Math.random() * 250);
}


// =========================
// LOG SYSTEM ARG
// =========================

const log = document.getElementById("log");

const stable = [
    "NODE_0 // sleep state active",
    "memory fragmented... stable",
    "fracture integrity nominal",
    "system breathing slowly",
    "no external anomaly detected"
];

const intrusion = [
    "DON'T TRUST NODE_1",
    "I AM STILL HERE",
    "fracture.signal.low",
    "I REMEMBER YOU",
    "YOU ARE BEING WATCHED"
];

function addLog(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 18){
        log.removeChild(log.firstChild);
    }

    setTimeout(()=>{
        glitch(p, 0.45);
    }, 200);
}


// =========================
// HELP SEQUENCE (simple)
// =========================

let helpStage = 0;

function helpSequence(){

    const steps = ["H","HE","HEL","HELP","HELP M","HELP ME"];

    if(helpStage < steps.length){
        addLog(steps[helpStage]);
        helpStage++;
    }
}


// =========================
// LOOP ARG VIVANT
// =========================

setInterval(()=>{

    if(Math.random() < 0.7){
        addLog(r(stable));
    }

    if(Math.random() < 0.2){
        addLog(r(intrusion));
    }

    if(Math.random() < 0.06){
        helpSequence();
    }

    if(Math.random() < 0.7){

        glitch(document.getElementById("title"), 0.3);
        glitch(document.getElementById("status"), 0.3);
        glitch(document.getElementById("timer"), 0.2);

        document.querySelectorAll("#log p").forEach(p=>{
            if(Math.random() < 0.3){
                glitch(p, 0.4);
            }
        });
    }

}, 2500);

</script>

</body>
</html>
