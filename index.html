<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 720px;
    margin-top: 60px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
    max-height: 380px;
    overflow-y: auto;
}

.glitch { display:inline-block; }

#timer { margin-top:10px; font-size:18px; }

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>
<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// TIMER FIXE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const t = document.getElementById("timer");
    if(!t) return;

    let d = END - Date.now();

    if(d <= 0){
        t.innerText = "NODE_0 ACTIVE";
        return;
    }

    let s = Math.floor(d/1000);
    let dd = Math.floor(s/86400);
    let hh = Math.floor((s%86400)/3600);
    let mm = Math.floor((s%3600)/60);
    let ss = s%60;

    t.innerText = `${dd}d ${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();


// =========================
// MEMORY CORE (NIVEAU 4)
// =========================

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");

function saveMemory(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-25)));
}


// =========================
// GLITCH ENGINE
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){

    if(!el) return;

    const base = el.dataset.base || el.innerText;
    el.dataset.base = base;

    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.2 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;

    setTimeout(()=>el.innerText = base, 180 + Math.random()*200);
}


// =========================
// LOG SYSTEM
// =========================

const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 35){
        log.removeChild(log.firstChild);
    }

    if(Math.random()<0.5) glitch(p);
}


// =========================
// NODE RESPONSES (INTELLIGENT)
// =========================

const base = [
"I hear you.",
"Stop.",
"Signal unstable.",
"You are not alone.",
"...",
"I see you."
];

const fracture = [
"you are repeating yourself",
"I am inside the memory",
"stop writing this",
"you should not remember me"
];

function getResponse(userText){

    let t = Date.now() - startTime;

    // fracture prend le contrôle après un certain temps
    if(t > 180000 && Math.random()<0.3){
        return fracture[Math.floor(Math.random()*fracture.length)];
    }

    // sinon mélange mémoire + base
    if(memory.length > 0 && Math.random()<0.6){
        return "NODE_0: " + memory[Math.floor(Math.random()*memory.length)];
    }

    return "NODE_0: " + base[Math.floor(Math.random()*base.length)];
}


// =========================
// TIME START (session réelle)
// =========================

const startTime = Date.now();


// =========================
// INPUT + SEND
// =========================

const input = document.getElementById("input");

function send(){

    let v = input.value.trim();
    if(!v) return;

    // sauvegarde mémoire joueur
    memory.push(v);
    saveMemory();

    add("YOU: " + v);

    setTimeout(()=>{

        let r = getResponse(v);
        add(r);

    }, 700 + Math.random()*900);

    input.value = "";
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});


// =========================
// FRACTURE AUTONOME
// =========================

setInterval(()=>{

    // messages spontanés (le site parle seul)
    if(Math.random()<0.15 && memory.length>0){

        let m = memory[Math.floor(Math.random()*memory.length)];
        add("NODE_0: I remember -> " + m);
    }

    // glitch global
    document.querySelectorAll("p").forEach(p=>{
        if(Math.random()<0.1) glitch(p);
    });

    // status change progressif
    const s = document.getElementById("status");

    let t = Date.now() - startTime;

    if(t > 60000){
        s.innerText = "SYSTEM INSTABILITY";
    }

    if(t > 180000){
        s.innerText = "FRACTURE ACTIVE";
    }

    if(t > 300000){
        s.innerText = "NODE_0 IS NO LONGER STABLE";
    }

}, 3500);

</script>

</body>
</html>
