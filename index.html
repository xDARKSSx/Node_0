<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body{
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
}

#container{
    width:720px;
    margin-top:60px;
}

#log{
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
    margin-top:20px;
}

input,button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
}

#fracture{
    width:300px;
    margin-top:15px;
    opacity:0.9;
    transition:0.2s;
}

#timer{
    margin-top:10px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM STABLE</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="message...">
<button id="send">SEND</button>

</div>

<script src="node0.js"></script>

</body>
</html>
