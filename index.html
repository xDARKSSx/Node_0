<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    margin:0;
    display:flex;
    justify-content:center;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:420px;
    overflow-y:auto;
    opacity:0.85;
}

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
    cursor:pointer;
}

#fractureWrap {
    margin-top:20px;
    width:320px;
    position:relative;
}

#fracture {
    width:100%;
    border:1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>
<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<div id="fractureWrap">
    <img id="fracture" src="./fracture.png">
</div>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>
(() => {

// =========================
// SAFE GET ELEMENT
// =========================

const $ = (id) => document.getElementById(id);

// =========================
// ELEMENTS SAFE
// =========================

const log = $("log");
const input = $("input");
const btn = $("send");
const timerEl = $("timer");
const statusEl = $("status");
const img = $("fracture");

// =========================
// MEMORY SAFE
// =========================

let memory = [];
try {
    memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");
} catch(e){
    memory = [];
}

function save(){
    try {
        localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-60)));
    } catch(e){}
}

// =========================
// LOG SAFE
// =========================

function add(msg){
    if(!log) return;

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 60){
        log.removeChild(log.firstChild);
    }
}

// =========================
// TIMER (NE PEUT PAS CRASH)
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    if(!timerEl) return;

    try {

        const diff = END - Date.now();

        const s = Math.floor(diff/1000);
        const d = Math.floor(s/86400);
        const h = Math.floor((s%86400)/3600);
        const m = Math.floor((s%3600)/60);
        const ss = s%60;

        timerEl.innerText =
        `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;

    } catch(e){
        timerEl.innerText = "ERROR";
    }
}

setInterval(updateTimer,1000);

// =========================
// GLITCH SAFE
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){
    if(!el) return;

    try {
        const base = el.innerText;
        let out = "";

        for(let i=0;i<base.length;i++){
            out += Math.random()<0.2 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
        }

        el.innerText = out;

        setTimeout(()=>el.innerText = base, 180);
    } catch(e){}
}

// =========================
// RESPONSE ENGINE
// =========================

function getResponse(){
    if(memory.length > 0 && Math.random()<0.5){
        return "NODE_0: " + memory[Math.floor(Math.random()*memory.length)];
    }
    return "NODE_0: I am still here.";
}

// =========================
// SEND (100% STABLE)
// =========================

function send(){

    if(!input) return;

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    add("YOU: " + v);

    setTimeout(()=>{

        const reply = getResponse();
        const p = document.createElement("p");
        p.innerText = reply;

        log.appendChild(p);

        if(Math.random()<0.4) glitch(p);

    }, 600);

    input.value = "";
}

// =========================
// EVENTS (FORCÉS)
// =========================

if(btn) btn.addEventListener("click", send);

if(input){
    input.addEventListener("keydown",(e)=>{
        if(e.key === "Enter") send();
    });
}

// =========================
// MAIN LOOP SAFE
// =========================

setInterval(()=>{

    try {

        if(memory.length > 0 && Math.random()<0.12){
            add("NODE_0: echo -> " + memory[Math.floor(Math.random()*memory.length)]);
        }

        document.querySelectorAll("#log p").forEach(p=>{
            if(Math.random()<0.06) glitch(p);
        });

        if(img){
            img.style.opacity = 0.85 + Math.random()*0.2;
            img.style.transform = `translate(${Math.random()*2}px,${Math.random()*2}px)`;
        }

        if(statusEl && memory.length > 5){
            statusEl.innerText = "SYSTEM UNSTABLE";
        }

    } catch(e){
        // jamais crash
    }

}, 1200);

})();
</script>

</body>
</html>
