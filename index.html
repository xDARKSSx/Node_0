<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:400px;
    overflow:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

button {
    background:#000;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="timer"></p>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>
console.log("NODE_0 ONLINE");

// =========================
// SAFE INIT (IMPORTANT)
// =========================

window.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("send");
const input = document.getElementById("input");
const log = document.getElementById("log");

// =========================
// SAFE FUNCTION ADD
// =========================

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);
}

// =========================
// SEND GUARANTEED
// =========================

function send(){

    if(!input) return;

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    setTimeout(() => {
        add("NODE_0: " + value);
    }, 500);

    input.value = "";
}

// 🔥 FORCE BIND (DOUBLE SAFE)
btn.onclick = send;
btn.addEventListener("click", send);

// ENTER
input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

console.log("SEND SYSTEM READY");

});
</script>

</body>
</html>
