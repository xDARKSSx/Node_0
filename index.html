<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

////////////////////////////////////////////////////
// FIREBASE INIT
////////////////////////////////////////////////////
const firebaseConfig = {
    databaseURL: "https://node-0-26139-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

////////////////////////////////////////////////////
// GLOBAL STATE (IMPORTANT)
////////////////////////////////////////////////////
let state = {};

db.ref("/").on("value", (snap) => {
    state = snap.val() || {};

    if(state.chapter === 2){
        document.getElementById("status").innerText = "SYSTEM UNSTABLE";
    }
});

////////////////////////////////////////////////////
// LOG SYSTEM
////////////////////////////////////////////////////
const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 60){
        log.removeChild(log.firstChild);
    }

    log.scrollTop = log.scrollHeight;
}

////////////////////////////////////////////////////
// TIMER
////////////////////////////////////////////////////
const timer = document.getElementById("timer");
const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:` +
    `${String(m).padStart(2,"0")}:` +
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

////////////////////////////////////////////////////
// INPUT GLITCH (LIGHT)
////////////////////////////////////////////////////
const input = document.getElementById("input");

const symbols = ["█","#","%","&","@","?","$"];

input.addEventListener("input", () => {

    let value = input.value;
    let out = "";

    for(let i = 0; i < value.length; i++){
        if(Math.random() < 0.04){
            out += symbols[Math.floor(Math.random()*symbols.length)];
        } else {
            out += value[i];
        }
    }

    input.value = out;
});

////////////////////////////////////////////////////
// PUZZLE SYSTEM (GLOBAL ARG CORE)
////////////////////////////////////////////////////
function checkPuzzle(value){

    if(!state.puzzle?.active) return false;

    const answer = value.trim().toLowerCase();
    const solution = (state.puzzle.solution || "").toLowerCase();

    if(answer === solution){

        db.ref("chapter").set((state.chapter || 1) + 1);
        db.ref("puzzle/active").set(false);
        db.ref("puzzle/solvedBy").set("player");

        add("NODE_0: ...ERROR... KEY ACCEPTED...");
        add("SYSTEM: CHAPTER SHIFT INITIATED");

        return true;
    }

    return false;
}

////////////////////////////////////////////////////
// SEND SYSTEM + NODE_0
////////////////////////////////////////////////////
const btn = document.getElementById("send");

function send(){

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    // 🔥 PUZZLE CHECK FIRST
    if(checkPuzzle(value)){
        input.value = "";
        return;
    }

    setTimeout(() => {

        let response = "";

        if(state.chapter === 1){

            if(value.toLowerCase().includes("who are you")){
                response = "NODE_0: I am not supposed to exist fully.";
            }
            else{
                response = "NODE_0: " + noise();
            }
        }

        if(state.chapter === 2){

            if(value.toLowerCase().includes("who are you")){
                response = "NODE_0: I was fragmented... but still active.";
            }
            else{
                response = "NODE_0: " + corrupt(value);
            }
        }

        add(response);

    }, 600);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

////////////////////////////////////////////////////
// NODE_0 PERSONALITY
////////////////////////////////////////////////////
function noise(){
    const msgs = [
        "signal unstable",
        "memory drift detected",
        "echo without origin",
        "fragment breathing"
    ];
    return msgs[Math.floor(Math.random()*msgs.length)];
}

function corrupt(text){
    return text.split("").map(c => {
        return Math.random() < 0.12
            ? symbols[Math.floor(Math.random()*symbols.length)]
            : c;
    }).join("");
}

</script>

</body>
</html>
