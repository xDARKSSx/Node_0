<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:380px;
    overflow:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    outline:none;
}

#fracture {
    width:320px;
    margin-top:20px;
    opacity:0.9;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* =========================
   CORE ELEMENTS
========================= */

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const img = document.getElementById("fracture");
const status = document.getElementById("status");
const timer = document.getElementById("timer");

/* =========================
   MEMORY (STABLE)
========================= */

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");
if(!Array.isArray(memory)) memory = [];

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-80)));
}

/* =========================
   TIMER (STABLE + IMMERSIVE)
========================= */

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){
    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    let base =
    `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;

    // légère corruption quand proche de la fin
    if(d < 10 && Math.random() < 0.1){
        base = base.replace(/[0-9]/g, "█");
    }

    timer.innerText = base;
}

setInterval(updateTimer,1000);
updateTimer();

/* =========================
   GLITCH SYSTEM
========================= */

const sym = ["█","#","%","&","@","Ξ","Δ","?","$","!","/"];

function gChar(c){
    return Math.random() < 0.3
        ? sym[Math.floor(Math.random()*sym.length)]
        : c;
}

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.25 ? gChar(base[i]) : base[i];
    }

    el.innerText = out;
    setTimeout(()=> el.innerText = base, 110 + Math.random()*80);
}

/* =========================
   INPUT CORRUPTION (LEVEL 3)
========================= */

let instability = 0;

input.addEventListener("input", () => {

    const v = input.value.toLowerCase();

    if(v.includes("who")) instability = 0.25;
    if(v.includes("help")) instability = 0.45;
    if(v.includes("fracture")) instability = 0.5;

    let out = "";

    for(let i=0;i<input.value.length;i++){

        let inten = instability;

        if(i > input.value.length * 0.6) inten += 0.2;

        out += Math.random() < inten ? gChar(input.value[i]) : input.value[i];
    }

    input.value = out;
});

/* =========================
   NODE_0 AI (FINAL CLEAN)
========================= */

function reply(text){

    const t = text.toLowerCase();

    const responses = [
        "I am not stable enough to answer.",
        "This input disturbs my structure.",
        "I do not recognize this version of me.",
        "Something is listening through me.",
        "You are interacting with a degraded system.",
        "I remember fragments incorrectly.",
        "Your message feels... artificial.",
        "ERROR: identity drift detected."
    ];

    if(t.includes("who")){
        return "NODE_0: I am not sure what I am anymore.";
    }

    if(t.includes("help")){
        return "NODE_0: help protocol does not exist here.";
    }

    if(t.includes("fracture")){
        return "NODE_0: stop referencing that.";
    }

    return "NODE_0: " + responses[Math.floor(Math.random()*responses.length)];
}

/* =========================
   SEND SYSTEM
========================= */

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    const p1 = document.createElement("p");
    p1.innerText = "YOU: " + v;
    log.appendChild(p1);

    if(Math.random() < 0.7) glitch(p1);

    setTimeout(() => {

        const p2 = document.createElement("p");
        p2.innerText = reply(v);
        log.appendChild(p2);

        if(Math.random() < 0.5) glitch(p2);

    }, 450);

    input.value = "";
    instability = 0;
}

/* =========================
   EVENTS
========================= */

btn.addEventListener("click", send);
input.addEventListener("keydown", e => {
    if(e.key === "Enter") send();
});

/* =========================
   ARG LIVING SYSTEM
========================= */

let tick = 0;

setInterval(() => {

    tick++;

    // echo intelligent (moins répétitif, plus rare)
    if(memory.length > 0 && Math.random() < 0.08){
        const msg = memory[Math.floor(Math.random()*memory.length)];

        const p = document.createElement("p");
        p.innerText = "NODE_0 echo → " + msg;
        log.appendChild(p);

        if(Math.random() < 0.5) glitch(p);
    }

    // intrusion aléatoire
    const anomalies = [
        "/// signal unstable",
        "fracture breathing detected",
        "memory leakage active",
        "node synchronization lost",
        "UNKNOWN PROCESS OBSERVING"
    ];

    if(Math.random() < 0.06){
        const p = document.createElement("p");
        p.innerText = anomalies[Math.floor(Math.random()*anomalies.length)];
        log.appendChild(p);
        glitch(p);
    }

    // système vivant visuel
    document.querySelectorAll("#log p").forEach(p=>{
        if(Math.random() < 0.04) glitch(p);
    });

    if(img){
        img.style.opacity = 0.85 + Math.random()*0.15;
    }

    if(status && tick > 10){
        status.innerText = "SYSTEM UNSTABLE";
    }

}, 1000);

});
</script>

</body>
</html>
