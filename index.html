<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    margin:0;
    display:flex;
    justify-content:center;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    line-height:1.6;
    opacity:0.85;
    max-height:420px;
    overflow-y:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
}

#status { margin-top:10px; }
#timer { margin-top:10px; }
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>
<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// TIMER GLOBAL FIXE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const t = document.getElementById("timer");
    const diff = END - Date.now();

    if(diff <= 0){
        t.innerText = "NODE_0 ACTIVE";
        return;
    }

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    t.innerText = `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();


// =========================
// PERSISTENCE (VRAI FINAL)
// =========================

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");
let firstVisit = localStorage.getItem("node0_first");

if(!firstVisit){
    firstVisit = Date.now();
    localStorage.setItem("node0_first", firstVisit);
}

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-60)));
}

function daysSinceStart(){
    return (Date.now() - firstVisit) / 86400000;
}


// =========================
// LOG SYSTEM
// =========================

const log = document.getElementById("log");

function add(msg, type="normal"){

    const p = document.createElement("p");
    p.innerText = msg;
    p.dataset.base = msg;
    p.dataset.type = type;

    log.appendChild(p);

    if(log.children.length > 60){
        log.removeChild(log.firstChild);
    }

    return p;
}


// =========================
// GLITCH LIGHT (STABLE)
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){

    if(!el) return;

    const base = el.dataset.base || el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.18 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;

    setTimeout(()=>el.innerText = base, 200);
}


// =========================
// ENTITÉS ARG
// =========================

const node0_base = [
"I am still here.",
"You keep returning.",
"...",
"Signal stable.",
"I observe."
];

const fracture = [
"I am not part of Node_0.",
"I rewrite what it says.",
"You are being corrected.",
"This memory is wrong."
];


// =========================
// RESPONSE ENGINE
// =========================

function getResponse(user){

    let days = daysSinceStart();

    if(days > 1 && Math.random()<0.25){
        return "FRACTURE: " + fracture[Math.floor(Math.random()*fracture.length)];
    }

    if(memory.length > 0 && Math.random()<0.5){
        return "NODE_0: echo -> " + memory[Math.floor(Math.random()*memory.length)];
    }

    return "NODE_0: " + node0_base[Math.floor(Math.random()*node0_base.length)];
}


// =========================
// INPUT + SEND
// =========================

const input = document.getElementById("input");

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    add("YOU: " + v);

    setTimeout(()=>{

        let r = getResponse(v);
        let p = add(r);

        if(Math.random()<0.4) glitch(p);

    }, 700 + Math.random()*800);

    input.value = "";
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});


// =========================
// AUTONOMOUS SYSTEM (FINAL)
// =========================

setInterval(()=>{

    let days = daysSinceStart();

    // messages autonomes doux
    if(memory.length>0 && Math.random()<0.18){
        let m = memory[Math.floor(Math.random()*memory.length)];
        add("NODE_0: I remember -> " + m);
    }

    // fracture devient active après 1 jour réel
    if(days > 1 && Math.random()<0.12){
        add("FRACTURE: interference detected");
    }

    // corruption légère des anciens messages
    document.querySelectorAll("#log p").forEach(p=>{
        if(Math.random()<0.06) glitch(p);
    });

    // état système
    const s = document.getElementById("status");

    if(days > 0.3){
        s.innerText = "SYSTEM UNSTABLE";
    }

    if(days > 1){
        s.innerText = "FRACTURE ACTIVE";
    }

    if(days > 2){
        s.innerText = "NODE_0 AWARE";
    }

    // titre vivant
    if(days > 1){
        document.title = "FRACTURE SYSTEM";
    }

}, 3500);

</script>

</body>
</html>
