<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:380px;
    overflow:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// SAFE BOOT (IMPORTANT)
// =========================

document.addEventListener("DOMContentLoaded", () => {

console.log("NODE_0 STARTED");

// =========================
// SAFE ELEMENTS (NE PEUT PAS CRASH)
// =========================

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const img = document.getElementById("fracture");
const status = document.getElementById("status");
const timer = document.getElementById("timer");

// =========================
// MEMORY SAFE
// =========================

let memory = [];

try {
    memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");
} catch(e){
    memory = [];
}

function save(){
    try {
        localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-50)));
    } catch(e){}
}

// =========================
// ADD SAFE
// =========================

function add(msg){
    if(!log) return;

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }
}

// =========================
// TIMER SAFE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){
    if(!timer) return;

    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

// =========================
// SEND (DOUBLE SAFE)
// =========================

function send(){

    if(!input) return;

    const value = input.value.trim();
    if(!value) return;

    memory.push(value);
    save();

    add("YOU: " + value);

    setTimeout(() => {
        add("NODE_0: " + value);
    }, 600);

    input.value = "";
}

// 🔥 IMPORTANT: DOUBLE BIND SAFE
if(btn){
    btn.addEventListener("click", send);
    btn.onclick = send;
}

if(input){
    input.addEventListener("keydown", (e) => {
        if(e.key === "Enter") send();
    });
}

// =========================
// AUTO SAFE LOOP
// =========================

setInterval(() => {

    try {

        if(memory.length > 0 && Math.random() < 0.1){
            add("NODE_0: echo -> " + memory[Math.floor(Math.random()*memory.length)]);
        }

        if(img){
            img.style.opacity = 0.85 + Math.random()*0.15;
            img.style.transform = `translate(${Math.random()*2}px,${Math.random()*2}px)`;
        }

        if(status && memory.length > 5){
            status.innerText = "SYSTEM UNSTABLE";
        }

    } catch(e){
        console.log("loop safe catch");
    }

}, 1200);

});

</script>

</body>
</html>
