<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    margin:0;
    display:flex;
    justify-content:center;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    line-height:1.6;
    opacity:0.85;
    max-height:420px;
    overflow-y:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
}

#status { margin-top:10px; }
#timer { margin-top:10px; }

img {
    width:320px;
    margin-top:20px;
    border:1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>
<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<!-- ✅ IMAGE FRACTURE AJOUTÉE -->
<img src="./fracture.png" id="fracture">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// TIMER FIXE (NE RESET PLUS)
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const el = document.getElementById("timer");
    const diff = END - Date.now();

    if(diff <= 0){
        el.innerText = "NODE_0 ACTIVE";
        return;
    }

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    el.innerText = `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();


// =========================
// MEMORY
// =========================

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-60)));
}


// =========================
// LOG
// =========================

const log = document.getElementById("log");

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);
    if(log.children.length > 60){
        log.removeChild(log.firstChild);
    }
    return p;
}


// =========================
// GLITCH SIMPLE
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){

    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.2 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;

    setTimeout(()=>el.innerText = base, 180);
}


// =========================
// RESPONSES
// =========================

const base = [
"I hear you.",
"I am still here.",
"...",
"You are observed.",
"Signal stable."
];

const fracture = [
"I should not be here.",
"I remember incorrectly.",
"This is not stable.",
"I changed something."
];

function getResponse(){
    if(memory.length > 0 && Math.random()<0.5){
        return "NODE_0: " + memory[Math.floor(Math.random()*memory.length)];
    }
    return "NODE_0: " + base[Math.floor(Math.random()*base.length)];
}


// =========================
// SEND
// =========================

const input = document.getElementById("input");

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    add("YOU: " + v);

    setTimeout(()=>{

        let r;

        if(Math.random()<0.2){
            r = "FRACTURE: " + fracture[Math.floor(Math.random()*fracture.length)];
        } else {
            r = getResponse();
        }

        const p = add(r);
        if(Math.random()<0.4) glitch(p);

    }, 700);

    input.value = "";
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});


// =========================
// AUTONOMOUS SYSTEM
// =========================

setInterval(()=>{

    if(memory.length>0 && Math.random()<0.15){
        const m = memory[Math.floor(Math.random()*memory.length)];
        add("NODE_0: echo -> " + m);
    }

    document.querySelectorAll("#log p").forEach(p=>{
        if(Math.random()<0.08) glitch(p);
    });

    const s = document.getElementById("status");

    if(memory.length > 5){
        s.innerText = "SYSTEM UNSTABLE";
    }

    if(memory.length > 10){
        s.innerText = "FRACTURE ACTIVE";
    }

}, 3000);

</script>

</body>
</html>
