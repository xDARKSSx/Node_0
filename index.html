<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

////////////////////////////////////////////////////
// FIREBASE
////////////////////////////////////////////////////
const firebaseConfig = {
    databaseURL: "https://node-0-26139-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let chapter = 1;

db.ref("chapter").on("value", (snap) => {
    chapter = snap.val();

    if(chapter === 2){
        add("NODE_0: fracture detected... reality shift...");
        document.getElementById("status").innerText = "SYSTEM UNSTABLE";
    }
});

////////////////////////////////////////////////////
// LOG SYSTEM
////////////////////////////////////////////////////
const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }

    log.scrollTop = log.scrollHeight;
}

////////////////////////////////////////////////////
// TIMER
////////////////////////////////////////////////////
const timer = document.getElementById("timer");
const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:` +
    `${String(m).padStart(2,"0")}:` +
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

////////////////////////////////////////////////////
// INPUT GLITCH (ÉQUILIBRÉ)
////////////////////////////////////////////////////
const input = document.getElementById("input");

const symbols = ["█","#","%","&","@","?","$","Ø","Δ"];

input.addEventListener("input", () => {

    let value = input.value;
    let glitched = "";

    for(let i = 0; i < value.length; i++){

        // 🔥 glitch léger (lisible)
        if(Math.random() < 0.05){
            glitched += symbols[Math.floor(Math.random()*symbols.length)];
        } else {
            glitched += value[i];
        }
    }

    input.value = glitched;
});

////////////////////////////////////////////////////
// SEND
////////////////////////////////////////////////////
const btn = document.getElementById("send");

function send(){

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    setTimeout(() => {

        if(chapter === 1){
            add("NODE_0: " + value);
        }

        if(chapter === 2){

            let corrupted = value.split("").map(c => {
                return Math.random() < 0.12
                    ? symbols[Math.floor(Math.random()*symbols.length)]
                    : c;
            }).join("");

            add("NODE_0: " + corrupted);
        }

    }, 600);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

////////////////////////////////////////////////////
// BACKGROUND LIFE
////////////////////////////////////////////////////
setInterval(() => {

    const msgs = [
        "memory fragment unstable",
        "fracture breathing detected",
        "signal weak but alive",
        "node watching...",
        "system drift detected"
    ];

    if(Math.random() < 0.25){
        add(msgs[Math.floor(Math.random()*msgs.length)]);
    }

}, 3000);

</script>

</body>
</html>
