<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:380px;
    overflow:auto;
    opacity:0.85;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
    border:1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

// =========================
// SAFE ELEMENTS
// =========================

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const img = document.getElementById("fracture");
const status = document.getElementById("status");
const timer = document.getElementById("timer");

// =========================
// MEMORY
// =========================

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-50)));
}

// =========================
// ADD LOG
// =========================

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }
}

// =========================
// TIMER (FIXE)
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){
    if(!timer) return;

    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

// =========================
// GLITCH
// =========================

const sym = ["█","#","%","&","@","Ξ","Δ","?"];

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.2 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;
    setTimeout(()=>el.innerText = base,180);
}

// =========================
// NODE RESPONSES
// =========================

const responses = [
"I am still here.",
"...",
"Signal unstable.",
"You are not alone.",
"NODE_0 breathing."
];

function nodeReply(){
    if(memory.length > 0 && Math.random()<0.6){
        return "NODE_0: echo -> " + memory[Math.floor(Math.random()*memory.length)];
    }
    return "NODE_0: " + responses[Math.floor(Math.random()*responses.length)];
}

// =========================
// SEND (STABLE)
// =========================

function send(){

    if(!input.value.trim()) return;

    const v = input.value.trim();

    memory.push(v);
    save();

    add("YOU: " + v);

    setTimeout(() => {
        const r = nodeReply();
        const p = document.createElement("p");
        p.innerText = r;

        log.appendChild(p);

        if(Math.random()<0.4) glitch(p);

    }, 600);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown",(e)=>{
    if(e.key === "Enter") send();
});

// =========================
// AUTONOMOUS NODE_0
// =========================

setInterval(() => {

    // auto echo
    if(memory.length > 0 && Math.random()<0.15){
        add("NODE_0: I remember -> " + memory[Math.floor(Math.random()*memory.length)]);
    }

    // glitch log
    document.querySelectorAll("#log p").forEach(p=>{
        if(Math.random()<0.06) glitch(p);
    });

    // image life
    if(img){
        img.style.opacity = 0.85 + Math.random()*0.15;
        img.style.transform = `translate(${Math.random()*2}px,${Math.random()*2}px)`;
    }

    // status evolution
    if(memory.length > 5){
        status.innerText = "SYSTEM UNSTABLE";
    }

    if(memory.length > 10){
        status.innerText = "FRACTURE ACTIVE";
    }

}, 1200);

});
</script>

</body>
</html>
