<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<!-- FIREBASE (OBLIGATOIRE ICI DANS HEAD) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

////////////////////////////////////////////////////
// 🔥 FIREBASE INIT (IMPORTANT)
////////////////////////////////////////////////////
const firebaseConfig = {
    databaseURL: "https://node-0-26139-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

////////////////////////////////////////////////////
// GLOBAL STATE
////////////////////////////////////////////////////
let chapter = 1;

db.ref("chapter").on("value", (snap) => {
    chapter = snap.val();

    if(chapter === 2){
        add("NODE_0: fracture detected... reality shift...");
        document.getElementById("status").innerText = "SYSTEM UNSTABLE";
    }
});

////////////////////////////////////////////////////
// LOG SYSTEM (FIX AUTO SCROLL)
////////////////////////////////////////////////////
const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }

    // auto scroll FIX
    log.scrollTop = log.scrollHeight;
}

////////////////////////////////////////////////////
// SEND SYSTEM FIX
////////////////////////////////////////////////////
const input = document.getElementById("input");
const btn = document.getElementById("send");

function send(){

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    // Node_0 réponse dépend du chapitre
    setTimeout(() => {

        if(chapter === 1){
            add("NODE_0: " + value);
        }

        if(chapter === 2){
            const corrupted = value.split("").map(c =>
                Math.random() < 0.2 ? "#" : c
            ).join("");

            add("NODE_0: " + corrupted);
        }

    }, 600);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

////////////////////////////////////////////////////
// BACKGROUND LIFE
////////////////////////////////////////////////////
setInterval(() => {

    const msgs = [
        "memory fragment unstable",
        "fracture breathing detected",
        "signal corrupted but alive",
        "node watching..."
    ];

    if(Math.random() < 0.3){
        add(msgs[Math.floor(Math.random()*msgs.length)]);
    }

}, 3000);

</script>

</body>
</html>
