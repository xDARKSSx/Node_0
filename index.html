<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:380px;
    overflow:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* =========================
   ELEMENTS SAFE
========================= */

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const img = document.getElementById("fracture");
const status = document.getElementById("status");
const timer = document.getElementById("timer");

/* =========================
   MEMORY SAFE
========================= */

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");

if(!Array.isArray(memory)) memory = [];

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-50)));
}

/* =========================
   ADD LOG
========================= */

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }
}

/* =========================
   TIMER FIXE
========================= */

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){
    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

/* =========================
   GLITCH
========================= */

const sym = ["█","#","%","&","@","Ξ","Δ","?"];

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.2
            ? sym[Math.floor(Math.random()*sym.length)]
            : base[i];
    }

    el.innerText = out;
    setTimeout(()=> el.innerText = base, 140);
}

/* =========================
   NODE_0 IA (FIXED)
========================= */

function reply(text){

    const t = text.toLowerCase();

    const responses = [
        "I am not repeating you.",
        "This feels unstable.",
        "I remember fragments of you.",
        "Why would you say that?",
        "SYSTEM CORRUPTION DETECTED",
        "I am thinking... slowly.",
        "You are not alone here.",
        "Something is wrong in me."
    ];

    if(t.includes("help")){
        return "NODE_0: I cannot help you properly.";
    }

    if(t.includes("who")){
        return "NODE_0: identity not stable.";
    }

    if(t.includes("fracture")){
        return "NODE_0: stop mentioning that.";
    }

    return "NODE_0: " + responses[Math.floor(Math.random()*responses.length)];
}

/* =========================
   SEND (FIXED + NON DUPLICATION)
========================= */

function send(){

    const v = input.value.trim();
    if(!v) return;

    if(!Array.isArray(memory)) memory = [];

    memory.push(v);
    save();

    // user message
    const p1 = document.createElement("p");
    p1.innerText = "YOU: " + v;
    log.appendChild(p1);

    if(Math.random() < 0.6) glitch(p1);

    // node response (IMPORTANT: pas de répétition brute)
    setTimeout(() => {

        const p2 = document.createElement("p");
        p2.innerText = reply(v);
        log.appendChild(p2);

        if(Math.random() < 0.4) glitch(p2);

    }, 500);

    input.value = "";
}

/* =========================
   EVENTS
========================= */

btn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

/* =========================
   ARG LOOP
========================= */

setInterval(() => {

    if(memory.length > 0 && Math.random() < 0.1){
        const p = document.createElement("p");
        p.innerText = "NODE_0 echo -> " +
        memory[Math.floor(Math.random()*memory.length)];
        log.appendChild(p);

        if(Math.random() < 0.4) glitch(p);
    }

    document.querySelectorAll("#log p").forEach(p => {
        if(Math.random() < 0.05) glitch(p);
    });

    if(img){
        img.style.opacity = 0.9 + Math.random()*0.1;
    }

    if(status && memory.length > 5){
        status.innerText = "SYSTEM UNSTABLE";
    }

}, 1200);

});
</script>

</body>
</html>
