<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0 // INTERFERENCE</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
}

#container{
    width:720px;
    margin-top:60px;
}

#log{
    margin-top:20px;
    max-height:380px;
    overflow:auto;
}

input, button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    outline:none;
}

#fracture{
    width:320px;
    margin-top:20px;
    opacity:0.9;
    transition:0.2s;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>

<p id="status">SYSTEM STABLE</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="enter query...">
<button id="send">SEND</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* =========================
   CORE
========================= */

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const status = document.getElementById("status");
const timer = document.getElementById("timer");
const img = document.getElementById("fracture");

/* =========================
   MEMORY
========================= */

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");
if(!Array.isArray(memory)) memory = [];

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-80)));
}

/* =========================
   TIMER
========================= */

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){
    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:`+
    `${String(m).padStart(2,"0")}:`+
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

/* =========================
   GLITCH
========================= */

const sym = ["█","#","%","&","@","Ξ","Δ","?","$","!"];

function g(){
    return sym[Math.floor(Math.random()*sym.length)];
}

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.22 ? g() : base[i];
    }

    el.innerText = out;
    setTimeout(()=> el.innerText = base, 90);
}

/* =========================
   NODE_1 INTERFERENCE ENGINE
========================= */

function node1Interfere(p){

    setTimeout(()=>{

        if(Math.random() < 0.55){

            const original = p.innerText;

            const corrections = [
                "[CORRECTED]",
                "[DATA ALTERED]",
                "[SIGNAL OVERRIDE]",
                "[NODE_1 ACCESS]"
            ];

            p.innerText =
                corrections[Math.floor(Math.random()*corrections.length)]
                + " " + original;

            glitch(p);
        }

    }, 800 + Math.random()*1200);
}

/* =========================
   LOG SYSTEM
========================= */

function addLog(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }

    // Node_1 peut interférer sur TOUT
    node1Interfere(p);

    if(Math.random() < 0.3){
        setTimeout(()=>glitch(p), 200);
    }
}

/* =========================
   NODE_0 RESPONSE
========================= */

function reply(text){

    const t = text.toLowerCase();

    if(t.includes("fracture")){
        return "NODE_0: stop referencing instability.";
    }

    if(t.includes("who")){
        return "NODE_0: identity undefined.";
    }

    if(t.includes("help")){
        return "NODE_0: no handler exists.";
    }

    const pool = [
        "memory conflict detected.",
        "output not verified.",
        "signal partially lost.",
        "something overwrote this response.",
        "I am not alone in processing this.",
        "data inconsistency growing."
    ];

    return "NODE_0: " + pool[Math.floor(Math.random()*pool.length)];
}

/* =========================
   SEND
========================= */

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    const userMsg = document.createElement("p");
    userMsg.innerText = "YOU: " + v;
    log.appendChild(userMsg);

    const nodeMsg = document.createElement("p");
    nodeMsg.innerText = reply(v);
    log.appendChild(nodeMsg);

    // Node_1 peut modifier Node_0 AUSSI
    node1Interfere(nodeMsg);

    input.value = "";
}

/* =========================
   EVENTS
========================= */

btn.addEventListener("click", send);
input.addEventListener("keydown", e=>{
    if(e.key === "Enter") send();
});

/* =========================
   LIVING SYSTEM
========================= */

setInterval(()=>{

    // fracture devient instable visuellement
    if(img){
        img.style.opacity = 0.7 + Math.random()*0.3;
        img.style.transform = `translate(${Math.random()*2}px,${Math.random()*2}px)`;
    }

    // Node_1 observe silencieusement
    if(Math.random() < 0.04){
        addLog(":: interference detected ::");
    }

    // status instable
    if(Math.random() < 0.2){
        glitch(status);
    }

    // mémoire fantôme
    if(memory.length > 0 && Math.random() < 0.05){
        addLog("echo -> " + memory[Math.floor(Math.random()*memory.length)]);
    }

}, 1100);

});
</script>

</body>
</html>
