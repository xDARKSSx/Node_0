<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

h1 {
    margin-bottom:10px;
}

#status {
    opacity:0.8;
}

#timer {
    margin-top:10px;
    font-size:16px;
}

#log {
    margin-top:20px;
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
}

#log p {
    margin:4px 0;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
    opacity:0.9;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// SAFE INIT
// =========================

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const timer = document.getElementById("timer");
const status = document.getElementById("status");

// =========================
// TIMER STABLE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    if(!timer) return;

    const diff = END - Date.now();

    if(diff <= 0){
        timer.innerText = "NODE_0 ACTIVE";
        return;
    }

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:` +
    `${String(m).padStart(2,"0")}:` +
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

// =========================
// NODE_0 LOG SYSTEM (FIX AUTO SCROLL + LIVING)
// =========================

function add(msg){

    if(!log) return;

    const p = document.createElement("p");

    let text = msg;

    // micro glitch chance
    if(Math.random() < 0.12){
        const symbols = ["█","#","%","&","@","?","$"];
        text = msg.split("").map(c => {
            return Math.random() < 0.06
                ? symbols[Math.floor(Math.random()*symbols.length)]
                : c;
        }).join("");
    }

    p.innerText = text;

    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }

    // AUTO SCROLL FIX
    log.scrollTop = log.scrollHeight;

    // post-glitch effect
    setTimeout(() => {
        if(Math.random() < 0.2){
            p.innerText = p.innerText.replaceAll(" ", "▒");
        }
    }, 300);
}

// =========================
// SEND SYSTEM FIX
// =========================

function send(){

    if(!input) return;

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    setTimeout(() => {
        add("NODE_0: " + value);
    }, 600);

    input.value = "";
}

if(btn){
    btn.addEventListener("click", send);
}

if(input){
    input.addEventListener("keydown", (e) => {
        if(e.key === "Enter") send();
    });
}

// =========================
// NODE_0 BACKGROUND LIFE
// =========================

setInterval(() => {

    if(Math.random() < 0.4){
        const msgs = [
            "memory fragment unstable",
            "fracture breathing detected",
            "node_1 interference low",
            "signal corrupted but alive",
            "system watching..."
        ];

        add(msgs[Math.floor(Math.random()*msgs.length)]);
    }

    if(status && Math.random() < 0.3){
        status.innerText = "SYSTEM " + (Math.random() < 0.5 ? "READY" : "UNSTABLE");
    }

}, 3000);

</script>

</body>
</html>
