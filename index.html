<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    padding: 40px;
}

.glitch {
    display: inline-block;
}

#log {
    margin-top: 20px;
    opacity: 0.8;
    line-height: 1.6;
}
</style>
</head>

<body>

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer">01:00:00</p>

<div id="log"></div>

<script>
// =======================
// GLITCH ENGINE v1 FIXED
// + NODE_0 "SLEEP STATE"
// =======================

const symbols = ["█", "#", "%", "&", "@", "Ø", "Ξ", "Δ"];

function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function glitchText(el, intensity = 0.2) {
    if (!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    let out = "";

    for (let i = 0; i < original.length; i++) {
        if (Math.random() < intensity && original[i] !== " ") {
            out += rand(symbols);
        } else {
            out += original[i];
        }
    }

    el.innerText = out;

    setTimeout(() => {
        el.innerText = original;
    }, 60 + Math.random() * 120);
}

// -----------------------
// NODE_0 “SLEEP LOGIC”
// -----------------------

const log = document.getElementById("log");

const baseMessages = [
    "NODE_0 // idle state confirmed",
    "memory fragment stable",
    "no external signal detected",
    "system breathing... slow",
    "waiting for trigger event"
];

const glitchMessages = [
    "H",
    "HE",
    "HEL",
    "HELP",
    "DON'T TRUST NODE_1",
    "IT IS NOT SLEEPING",
    "I CAN SEE YOU"
];

let tick = 0;

function addLog(msg) {
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if (log.children.length > 8) {
        log.removeChild(log.children[0]);
    }
}

// base “sleep chatter”
setInterval(() => {
    tick++;

    // normal whispers
    if (Math.random() < 0.6) {
        addLog(rand(baseMessages));
    }

    // rare intrusion (glitch entity)
    if (Math.random() < 0.15) {
        addLog(rand(glitchMessages));
    }

    // visual glitch on UI
    if (Math.random() < 0.4) {
        glitchText(document.getElementById("title"), 0.12);
        glitchText(document.getElementById("status"), 0.18);
    }

}, 2500);

</script>

</body>
</html>
