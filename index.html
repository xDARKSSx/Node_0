<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    padding: 40px;
}

#container {
    max-width: 700px;
}

.glitch {
    display: inline-block;
}

#timer {
    margin-top: 10px;
    font-size: 18px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
}

img {
    margin-top: 20px;
    width: 320px;
    border: 1px solid #00ff9f33;
}

.small-glitch {
    display:inline-block;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer"></p>

<img src="./fracture.png" id="fracture" alt="fracture" onerror="this.style.display='none'">

<div id="log"></div>

</div>

<script>
// =========================
// NODE_0 ARG ENGINE v3
// LENT / PERSISTENT / LIVING
// =========================

// ---------- TIMER 1 MOIS ----------
let totalSeconds = 30 * 24 * 60 * 60; // 1 mois

function updateTimer(){
    let d = Math.floor(totalSeconds / (24*3600));
    let h = Math.floor((totalSeconds % (24*3600)) / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;

    document.getElementById("timer").innerText =
    d + "d " + String(h).padStart(2,"0") + ":" +
    String(m).padStart(2,"0") + ":" +
    String(s).padStart(2,"0");

    if(totalSeconds > 0) totalSeconds--;
}
setInterval(updateTimer, 1000);

// ---------- GLITCH SYSTEM ----------
const symbols = ["█","#","%","&","@","Ø","Ξ","Δ"];

function r(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function glitch(el, intensity=0.15){
    if(!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    let out = "";

    for(let i=0;i<original.length;i++){
        if(Math.random() < intensity && original[i] !== " "){
            out += r(symbols);
        } else {
            out += original[i];
        }
    }

    el.innerText = out;

    setTimeout(()=>{
        el.innerText = original;
    }, 120 + Math.random()*200);
}

// ---------- LOGIC LENT ----------
const log = document.getElementById("log");

// messages stables (NODE endormi)
const stable = [
    "NODE_0 // sleep state active",
    "memory fragmented... stable",
    "fracture integrity nominal",
    "system breathing slowly",
    "no external anomaly detected"
];

// évolution lente HELP (très important)
let helpStage = 0;

function helpSequence(){
    const steps = [
        "H",
        "HE",
        "HEL",
        "HELP",
        "HELP M",
        "HELP ME"
    ];

    if(helpStage < steps.length){
        add(steps[helpStage]);
        helpStage++;
    }
}

// messages intrusion
const intrusion = [
    "DON'T TRUST NODE_1",
    "I AM STILL HERE",
    "YOU ARE OBSERVING ME",
    "fracture.signal.low",
];

// add log
function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 12){
        log.removeChild(log.children[0]);
    }
}

// ---------- LOOP PRINCIPAL (LENT) ----------
setInterval(()=>{

    // log normal lent
    if(Math.random() < 0.7){
        add(r(stable));
    }

    // intrusion rare
    if(Math.random() < 0.12){
        add(r(intrusion));
    }

    // HELP progression TRÈS lente
    if(Math.random() < 0.08){
        helpSequence();
    }

    // glitch visuel léger (pas agressif)
    if(Math.random() < 0.4){
        glitch(document.getElementById("title"), 0.10);
        glitch(document.getElementById("status"), 0.12);
    }

}, 4000);

</script>

</body>
</html>
