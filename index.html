<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0 // ACCESS POINT</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
}

#container{
    width:720px;
    margin-top:60px;
}

#log{
    margin-top:20px;
    max-height:380px;
    overflow:auto;
}

input, button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    outline:none;
}

#fracture{
    width:320px;
    margin-top:20px;
    opacity:0.9;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="enter query...">
<button id="send">SEND</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* =========================
   CORE
========================= */

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const status = document.getElementById("status");
const timer = document.getElementById("timer");
const img = document.getElementById("fracture");

/* =========================
   MEMORY (LOCAL)
========================= */

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");
if(!Array.isArray(memory)) memory = [];

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-50)));
}

/* =========================
   TIMER (ANCHOR FIXE)
========================= */

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){
    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:` +
    `${String(m).padStart(2,"0")}:` +
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

/* =========================
   GLITCH CORE (FAIBLE MAIS CONSTANT)
========================= */

const sym = ["█","#","%","&","@","Ξ","Δ","?","$","!"];

function g(){
    return sym[Math.floor(Math.random()*sym.length)];
}

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.18 ? g() : base[i];
    }

    el.innerText = out;
    setTimeout(()=> el.innerText = base, 120);
}

/* =========================
   FRACTURE PHENOMENON (IMPORTANT LORE)
========================= */

let fractureTick = 0;

function fractureEvent(){

    fractureTick++;

    if(fractureTick === 5){
        addLog(":: FRACTURE DETECTED ::");
    }

    if(fractureTick === 12){
        addLog("memory sector // incomplete");
    }

    if(fractureTick === 20){
        addLog("signal interference: NODE_1 ?");
    }
}

/* =========================
   LOG SYSTEM
========================= */

function addLog(msg){

    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 40){
        log.removeChild(log.firstChild);
    }

    if(Math.random() < 0.4){
        setTimeout(()=>glitch(p), 200);
    }
}

/* =========================
   NODE_0 RESPONSE (NON HUMAIN, FRAGMENTÉ)
========================= */

function reply(text){

    const t = text.toLowerCase();

    if(t.includes("who")){
        return "NODE_0: designation unclear.";
    }

    if(t.includes("fracture")){
        return "NODE_0: stop referencing unstable memory.";
    }

    if(t.includes("help")){
        return "NODE_0: request not recognized.";
    }

    const pool = [
        "memory segment corrupted.",
        "i cannot verify this input.",
        "this interaction is recorded.",
        "data feels incomplete.",
        "signal mismatch detected.",
        "something is filtering output."
    ];

    return "NODE_0: " + pool[Math.floor(Math.random()*pool.length)];
}

/* =========================
   SEND SYSTEM
========================= */

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    addLog("YOU: " + v);

    setTimeout(()=> {
        addLog(reply(v));
    }, 500);

    input.value = "";
}

/* =========================
   EVENTS
========================= */

btn.addEventListener("click", send);
input.addEventListener("keydown", e=>{
    if(e.key === "Enter") send();
});

/* =========================
   LIVING SYSTEM LOOP
========================= */

setInterval(()=>{

    fractureEvent();

    // mémoire fantôme (Node_0 répète sans comprendre)
    if(memory.length > 0 && Math.random() < 0.06){
        const ghost = memory[Math.floor(Math.random()*memory.length)];
        addLog(":: echo memory -> " + ghost);
    }

    // glitch environnement
    if(Math.random() < 0.25){
        glitch(status);
        glitch(timer);
    }

    // fracture influence image
    if(img){
        img.style.opacity = 0.85 + Math.random()*0.15;
    }

    // début suspicion Node_1
    if(fractureTick > 18 && Math.random() < 0.03){
        addLog("NODE_1 // monitoring active");
    }

}, 1100);

});
</script>

</body>
</html>
