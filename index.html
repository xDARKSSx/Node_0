<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;

    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 720px;
    margin-top: 60px;
}

.glitch {
    display: inline-block;
}

#status {
    margin-top: 10px;
}

#timer {
    margin-top: 10px;
    font-size: 18px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
}

img {
    margin-top: 20px;
    width: 320px;
    border: 1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer"></p>

<img src="./fracture.png" id="fracture" onerror="this.style.display='none'">

<div id="log"></div>

</div>

<script>

// =========================
// TIMER 1 MOIS (STABLE)
// =========================

let totalSeconds = 30 * 24 * 60 * 60;

function updateTimer(){
    let d = Math.floor(totalSeconds / (24*3600));
    let h = Math.floor((totalSeconds % (24*3600)) / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;

    document.getElementById("timer").innerText =
        d + "d " +
        String(h).padStart(2,"0") + ":" +
        String(m).padStart(2,"0") + ":" +
        String(s).padStart(2,"0");

    if(totalSeconds > 0) totalSeconds--;
}

setInterval(updateTimer, 1000);
updateTimer();

// =========================
// GLITCH ENGINE (LENT + SALE)
// =========================

const symbols = ["█","#","%","&","@","Ø","Ξ","Δ"];

function r(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// glitch MOTS COMPLETS (important pour effet "vivant")
function glitch(el, intensity = 0.22){
    if(!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    const words = original.split(" ");

    let out = words.map(w => {
        if(Math.random() < intensity){
            let c = "";
            let len = Math.max(2, w.length);

            for(let i=0;i<len;i++){
                c += r(symbols);
            }
            return c;
        }
        return w;
    });

    el.innerText = out.join(" ");

    setTimeout(()=>{
        el.innerText = original;
    }, 180 + Math.random()*250);
}

// =========================
// LORE NODE_0
// =========================

const log = document.getElementById("log");

const stable = [
    "NODE_0 // sleep state active",
    "memory fragmented... stable",
    "fracture integrity nominal",
    "system breathing slowly",
    "no external anomaly detected"
];

const intrusion = [
    "DON'T TRUST NODE_1",
    "I AM STILL HERE",
    "fracture.signal.low",
    "I REMEMBER YOU"
];

// HELP progression lente
let helpStage = 0;

function helpSequence(){
    const steps = ["H","HE","HEL","HELP","HELP M","HELP ME"];

    if(helpStage < steps.length){
        add(steps[helpStage]);
        helpStage++;
    }
}

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 12){
        log.removeChild(log.children[0]);
    }
}

// =========================
// LOOP PRINCIPAL (LENT)
// =========================

setInterval(()=>{

    // logs normaux
    if(Math.random() < 0.7){
        add(r(stable));
    }

    // intrusion
    if(Math.random() < 0.12){
        add(r(intrusion));
    }

    // HELP lent
    if(Math.random() < 0.08){
        helpSequence();
    }

    // glitch VISUEL global
    if(Math.random() < 0.5){
        glitch(document.getElementById("title"));
        glitch(document.getElementById("status"));
        glitch(document.getElementById("timer"));
    }

}, 4000);

</script>

</body>
</html>
