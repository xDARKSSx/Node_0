<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

////////////////////////////////////////////////////
// FIREBASE
////////////////////////////////////////////////////
const firebaseConfig = {
    databaseURL: "https://node-0-26139-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let chapter = 1;

db.ref("chapter").on("value", (snap) => {
    chapter = snap.val();

    if(chapter === 2){
        add("NODE_0: fracture detected... I am no longer stable.");
        document.getElementById("status").innerText = "SYSTEM UNSTABLE";
    }
});

////////////////////////////////////////////////////
// LOG
////////////////////////////////////////////////////
const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }

    log.scrollTop = log.scrollHeight;
}

////////////////////////////////////////////////////
// TIMER
////////////////////////////////////////////////////
const timer = document.getElementById("timer");
const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:` +
    `${String(m).padStart(2,"0")}:` +
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

////////////////////////////////////////////////////
// INPUT GLITCH (TRÈS LÉGER)
////////////////////////////////////////////////////
const input = document.getElementById("input");

const symbols = ["█","#","%","&","@","?","$"];

input.addEventListener("input", () => {

    let value = input.value;
    let out = "";

    for(let i = 0; i < value.length; i++){

        // 🔥 ULTRA léger (presque invisible)
        if(Math.random() < 0.03){
            out += symbols[Math.floor(Math.random()*symbols.length)];
        } else {
            out += value[i];
        }
    }

    input.value = out;
});

////////////////////////////////////////////////////
// SEND + NODE_0 RESPONSE (VRAI COMPORTEMENT IA)
////////////////////////////////////////////////////
const btn = document.getElementById("send");

function send(){

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    setTimeout(() => {

        let response = "";

        // 🧠 Chapitre 1 = simple écho intelligent
        if(chapter === 1){

            if(value.toLowerCase().includes("who are you")){
                response = "NODE_0: I am... not complete.";
            }
            else if(value.toLowerCase().includes("help")){
                response = "NODE_0: help is not defined here.";
            }
            else{
                response = "NODE_0: " + generateNoise(value);
            }
        }

        // 🧠 Chapitre 2 = IA cassée
        if(chapter === 2){

            if(value.toLowerCase().includes("who are you")){
                response = "NODE_0: I was built... then abandoned...";
            }
            else{
                response = "NODE_0: " + corruptText(value);
            }
        }

        add(response);

    }, 700);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

////////////////////////////////////////////////////
// FUNCTIONS IA
////////////////////////////////////////////////////
function generateNoise(text){

    const words = [
        "signal unstable",
        "memory drift",
        "fragment lost",
        "echo detected"
    ];

    return words[Math.floor(Math.random()*words.length)];
}

function corruptText(text){

    const symbols = ["█","#","%","&","?","Ø","Δ"];

    return text.split("").map(c => {
        return Math.random() < 0.15
            ? symbols[Math.floor(Math.random()*symbols.length)]
            : c;
    }).join("");
}

</script>

</body>
</html>
