<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    max-height:380px;
    overflow:auto;
    opacity:0.85;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
}

#fracture {
    width:320px;
    margin-top:20px;
    border:1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// SAFE TIMER (GitHub safe)
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer() {
    const el = document.getElementById("timer");
    if (!el) return;

    const diff = END - Date.now();

    const totalSeconds = Math.floor(diff / 1000);
    const d = Math.floor(totalSeconds / 86400);
    const h = Math.floor((totalSeconds % 86400) / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    el.innerText = `${d}d ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

setInterval(updateTimer, 1000);
updateTimer();


// =========================
// LOG SYSTEM
// =========================

const log = document.getElementById("log");

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 50){
        log.removeChild(log.firstChild);
    }
}


// =========================
// GLITCH (SAFE LIGHT VERSION)
// =========================

const symbols = ["█","#","%","&","@","Ξ","Δ","?"];

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random() < 0.15
            ? symbols[Math.floor(Math.random()*symbols.length)]
            : base[i];
    }

    el.innerText = out;

    setTimeout(() => {
        el.innerText = base;
    }, 200);
}


// =========================
// RESPONSES
// =========================

const responses = [
"I am still here.",
"...",
"Signal stable.",
"You are observed.",
"NODE_0 active."
];

function getResponse(){
    return "NODE_0: " + responses[Math.floor(Math.random()*responses.length)];
}


// =========================
// SEND (100% SAFE)
// =========================

document.getElementById("send").addEventListener("click", () => {

    const input = document.getElementById("input");

    if (!input || !input.value.trim()) return;

    const msg = input.value.trim();

    add("YOU: " + msg);

    setTimeout(() => {
        const r = getResponse();
        const p = document.createElement("p");
        p.innerText = r;

        log.appendChild(p);

        if (Math.random() < 0.3) glitch(p);

    }, 600);

    input.value = "";
});


// ENTER SUPPORT
document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        document.getElementById("send").click();
    }
});


// =========================
// AUTONOMOUS ARG LITE
// =========================

setInterval(() => {

    if (Math.random() < 0.15) {
        add("NODE_0: echo detected...");
    }

    document.querySelectorAll("#log p").forEach(p => {
        if (Math.random() < 0.05) glitch(p);
    });

    const img = document.getElementById("fracture");
    if (img) {
        img.style.opacity = 0.85 + Math.random() * 0.15;
        img.style.transform = `translate(${Math.random()*2}px,${Math.random()*2}px)`;
    }

}, 2000);

</script>

</body>
</html>
