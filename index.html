<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;

    /* CENTRAGE GLOBAL FIX */
    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 700px;
    margin-top: 60px;
}

.glitch {
    display: inline-block;
}

#timer {
    margin-top: 10px;
    font-size: 18px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
}

img {
    margin-top: 20px;
    width: 320px;
    border: 1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer"></p>

<img src="./fracture.png" id="fracture" onerror="this.style.display='none'">

<div id="log"></div>

</div>

<script>

// =========================
// TIMER 1 MOIS (FIX PROPRE)
// =========================

let totalSeconds = 30 * 24 * 60 * 60;

function updateTimer(){
    let d = Math.floor(totalSeconds / (24*3600));
    let h = Math.floor((totalSeconds % (24*3600)) / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;

    document.getElementById("timer").innerText =
    d + "d " +
    String(h).padStart(2,"0") + ":" +
    String(m).padStart(2,"0") + ":" +
    String(s).padStart(2,"0");

    if(totalSeconds > 0) totalSeconds--;
}

setInterval(updateTimer, 1000);
updateTimer();

// =========================
// GLITCH SYSTEM (STABLE)
// =========================

const symbols = ["█","#","%","&","@","Ø","Ξ","Δ"];

function r(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function glitch(el, intensity=0.12){
    if(!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    let out = "";

    for(let i=0;i<original.length;i++){
        if(Math.random() < intensity && original[i] !== " "){
            out += r(symbols);
        } else {
            out += original[i];
        }
    }

    el.innerText = out;

    setTimeout(()=>{
        el.innerText = original;
    }, 120 + Math.random()*200);
}

// =========================
// LORE NODE_0 (STABLE)
// =========================

const log = document.getElementById("log");

const stable = [
    "NODE_0 // sleep state active",
    "memory fragmented... stable",
    "fracture integrity nominal",
    "system breathing slowly",
    "no external anomaly detected"
];

const intrusion = [
    "DON'T TRUST NODE_1",
    "I AM STILL HERE",
    "fracture.signal.low",
];

let helpStage = 0;

function help(){
    const steps = ["H","HE","HEL","HELP","HELP M","HELP ME"];
    if(helpStage < steps.length){
        add(steps[helpStage]);
        helpStage++;
    }
}

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 12){
        log.removeChild(log.children[0]);
    }
}

// =========================
// LOOP LENT
// =========================

setInterval(()=>{

    if(Math.random() < 0.7){
        add(r(stable));
    }

    if(Math.random() < 0.12){
        add(r(intrusion));
    }

    if(Math.random() < 0.08){
        help();
    }

    if(Math.random() < 0.4){
        glitch(document.getElementById("title"));
        glitch(document.getElementById("status"));
    }

}, 4000);

</script>

</body>
</html>
