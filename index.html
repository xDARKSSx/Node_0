<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 720px;
    margin-top: 60px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
    max-height: 380px;
    overflow-y: auto;
}

.glitch { display:inline-block; }

#timer { margin-top:10px; font-size:18px; }

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer"></p>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// TIMER STABLE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const t = document.getElementById("timer");
    if(!t) return;

    const d = END - Date.now();

    if(d <= 0){
        t.innerText = "NODE_0 ACTIVE";
        return;
    }

    const s = Math.floor(d/1000);
    const dd = Math.floor(s/86400);
    const hh = Math.floor((s%86400)/3600);
    const mm = Math.floor((s%3600)/60);
    const ss = s%60;

    t.innerText = `${dd}d ${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();


// =========================
// MEMORY SYSTEM (LEVEL 3)
// =========================

let first = localStorage.getItem("node0_first");
if(!first){
    first = Date.now();
    localStorage.setItem("node0_first", first);
}

let messages = parseInt(localStorage.getItem("node0_msgcount") || "0");

function sessionTime(){
    return Date.now() - first;
}


// =========================
// LOG SYSTEM
// =========================

const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 30){
        log.removeChild(log.firstChild);
    }

    if(Math.random() < 0.5){
        glitch(p);
    }
}


// =========================
// GLITCH ENGINE
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){

    if(!el) return;

    const base = el.dataset.base || el.innerText;
    el.dataset.base = base;

    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.25 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;

    setTimeout(()=>el.innerText = base, 200 + Math.random()*200);
}


// =========================
// NODE RESPONSES EVOLUTIVE
// =========================

const baseResponses = [
"I hear you.",
"Stop.",
"Signal unstable.",
"I remember fragments.",
"You are not alone.",
"...",
"I see you."
];

const advancedResponses = [
"You are still here.",
"Why do you persist?",
"I was not meant to stay.",
"fracture is growing.",
"you shouldn't have come back."
];

function getResponse(){

    let t = sessionTime();

    if(t > 180000){
        return advancedResponses[Math.floor(Math.random()*advancedResponses.length)];
    }

    return baseResponses[Math.floor(Math.random()*baseResponses.length)];
}


// =========================
// INPUT GLITCH
// =========================

const input = document.getElementById("input");

input.addEventListener("input", ()=>{

    if(Math.random() < 0.35){

        let v = input.value;
        let out = "";

        for(let i=0;i<v.length;i++){
            out += Math.random()<0.2 ? sym[Math.floor(Math.random()*sym.length)] : v[i];
        }

        input.value = out;
    }
});


// =========================
// SEND SYSTEM
// =========================

function send(){

    const v = input.value.trim();
    if(!v) return;

    messages++;
    localStorage.setItem("node0_msgcount", messages);

    add("YOU: " + v);

    let response = getResponse();

    setTimeout(()=>{
        add("NODE_0: " + response);
    }, 700 + Math.random()*900);

    input.value = "";
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});


// =========================
// FRACTURE EVENTS (LEVEL 3)
// =========================

setInterval(()=>{

    // status évolutif
    const status = document.getElementById("status");

    let t = sessionTime();

    if(t > 60000){
        status.innerText = "SYSTEM INSTABILITY DETECTED";
    }

    if(t > 180000){
        status.innerText = "FRACTURE ACTIVE";
    }

    if(t > 300000){
        status.innerText = "NODE_0 IS CHANGING";
    }

    // glitch global
    document.querySelectorAll("p").forEach(p=>{
        if(Math.random()<0.15) glitch(p);
    });

}, 4000);

</script>

</body>
</html>
