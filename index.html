<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 720px;
    margin-top: 60px;
}

.glitch {
    display: inline-block;
}

#status {
    margin-top: 10px;
}

#timer {
    margin-top: 10px;
    font-size: 18px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
    max-height: 400px;
    overflow-y: auto;
}

img {
    margin-top: 20px;
    width: 320px;
    border: 1px solid #00ff9f33;
}

input, button {
    width: 100%;
    margin-top: 10px;
    background: #000;
    color: #00ff9f;
    border: 1px solid #00ff9f55;
    padding: 10px;
    font-family: monospace;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer"></p>

<img src="./fracture.png" id="fracture" onerror="this.style.display='none'">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// TIMER STABLE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const timer = document.getElementById("timer");
    if(!timer) return;

    const now = Date.now();
    const diff = END - now;

    if(diff <= 0){
        timer.innerText = "NODE_0 ACTIVE";
        return;
    }

    const totalSeconds = Math.floor(diff / 1000);

    const d = Math.floor(totalSeconds / 86400);
    const h = Math.floor((totalSeconds % 86400) / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    timer.innerText =
        `${d}d ${String(h).padStart(2,"0")}:` +
        `${String(m).padStart(2,"0")}:` +
        `${String(s).padStart(2,"0")}`;
}

setInterval(updateTimer, 1000);
updateTimer();


// =========================
// GLITCH ENGINE
// =========================

const symbols = ["█","#","%","&","@","Ø","Ξ","Δ","?","$"];

function r(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function glitch(el, intensity = 0.3){

    if(!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    const words = original.split(" ");

    const out = words.map(w => {

        if(Math.random() < intensity){

            let c = "";
            const len = Math.max(2, w.length);

            for(let i=0;i<len;i++){
                c += r(symbols);
            }

            return c;
        }

        return w;
    });

    el.innerText = out.join(" ");

    setTimeout(()=>{
        el.innerText = original;
    }, 120 + Math.random()*250);
}


// =========================
// LOG SYSTEM
// =========================

const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 25){
        log.removeChild(log.firstChild);
    }

    setTimeout(()=>glitch(p,0.5),150);
}


// =========================
// RESPONSES NODE_0
// =========================

const responses = [
"NODE_0: I hear you.",
"NODE_0: stop.",
"NODE_0: signal corrupted.",
"NODE_0: I remember fragments.",
"NODE_0: do not continue.",
"NODE_0: ...",
"NODE_0: YOU ARE NOT ALONE.",
"NODE_0: fracture active.",
"NODE_0: input unstable.",
"NODE_0: ERROR LANGUAGE",
"NODE_0: I see you."
];


// =========================
// TRIGGERS (mots clés)
// =========================

const triggers = {
    "fracture": "NODE_0: you shouldn't be looking at that.",
    "help": "NODE_0: I cannot help you.",
    "who": "NODE_0: I am what remains.",
    "hello": "NODE_0: ...",
    "why": "NODE_0: because you opened it."
};


// =========================
// INPUT GLITCH (AVANT SEND)
// =========================

const input = document.getElementById("input");

function glitchInput(){

    let v = input.value;
    if(!v) return;

    const sym = ["█","#","%","&","@"];

    let out = "";

    for(let i=0;i<v.length;i++){
        out += (Math.random()<0.25) ? sym[Math.floor(Math.random()*sym.length)] : v[i];
    }

    input.value = out;
}

input.addEventListener("input", ()=>{
    if(Math.random() < 0.4){
        glitchInput();
    }
});


// =========================
// SEND SYSTEM
// =========================

function send(){

    const v = input.value.trim();
    if(!v) return;

    add("YOU: " + v);

    let lower = v.toLowerCase();
    let response = null;

    for(let key in triggers){
        if(lower.includes(key)){
            response = triggers[key];
            break;
        }
    }

    if(!response){
        response = responses[Math.floor(Math.random()*responses.length)];
    }

    setTimeout(()=>{
        add(response);
    }, 600 + Math.random()*1200);

    input.value = "";
}

document.getElementById("send").addEventListener("click", send);

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});


// =========================
// VISUAL GLITCH LOOP
// =========================

setInterval(()=>{

    glitch(document.getElementById("title"),0.3);
    glitch(document.getElementById("status"),0.3);
    glitch(document.getElementById("timer"),0.2);

},3000);

</script>

</body>
</html>
