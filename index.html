<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>
<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    padding: 40px;
}

.glitch {
    display: inline-block;
}

.hidden {
    visibility: hidden;
}
</style>
</head>

<body>

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer">01:00:00</p>

<script>
// =====================
// GLITCH ENGINE v1
// =====================

const symbols = ["█", "#", "%", "&", "@", "Ø", "Ξ", "Δ"];

function randomChar() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function glitchText(element, intensity = 0.2) {
    const original = element.dataset.original || element.innerText;
    element.dataset.original = original;

    let glitched = "";

    for (let i = 0; i < original.length; i++) {
        if (Math.random() < intensity && original[i] !== " ") {
            glitched += randomChar();
        } else {
            glitched += original[i];
        }
    }

    element.innerText = glitched;

    setTimeout(() => {
        element.innerText = original;
    }, 80 + Math.random() * 120);
}

// Glitch loop (soft at start)
function startGlitch() {
    const targets = [
        document.getElementById("title"),
        document.getElementById("status")
    ];

    setInterval(() => {
        const target = targets[Math.floor(Math.random() * targets.length)];
        glitchText(target, 0.15);
    }, 2000);
}

startGlitch();
</script>

</body>
</html>
