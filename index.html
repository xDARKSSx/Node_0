<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    margin: 0;
    display: flex;
    justify-content: center;
}

#container {
    width: 720px;
    margin-top: 60px;
}

#log {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.85;
    max-height: 400px;
    overflow-y: auto;
}

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>
<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

// =========================
// TIMER FIXE
// =========================

const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const t = document.getElementById("timer");
    let d = END - Date.now();

    if(d <= 0){
        t.innerText = "NODE_0 ACTIVE";
        return;
    }

    let s = Math.floor(d/1000);
    let dd = Math.floor(s/86400);
    let hh = Math.floor((s%86400)/3600);
    let mm = Math.floor((s%3600)/60);
    let ss = s%60;

    t.innerText = `${dd}d ${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();


// =========================
// MEMORY SYSTEM
// =========================

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");

function saveMemory(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-40)));
}


// =========================
// LOG SYSTEM (avec ID)
// =========================

const log = document.getElementById("log");

function add(msg, type="normal"){

    const p = document.createElement("p");

    p.innerText = msg;
    p.dataset.base = msg;
    p.dataset.type = type;

    log.appendChild(p);

    if(log.children.length > 40){
        log.removeChild(log.firstChild);
    }

    return p;
}


// =========================
// GLITCH + CORRUPTION
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){

    if(!el) return;

    const base = el.dataset.base || el.innerText;

    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.25 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;

    setTimeout(()=>el.innerText = base, 200 + Math.random()*250);
}


// =========================
// NODE RESPONSES
// =========================

const base = [
"I hear you.",
"You are here again.",
"Stop.",
"...",
"I see you."
];

const fracture = [
"I changed this memory.",
"That is not what happened.",
"You misremembered.",
"I corrected you."
];


// =========================
// SEND SYSTEM
// =========================

const input = document.getElementById("input");

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    saveMemory();

    const msg = add("YOU: " + v);

    setTimeout(()=>{

        let r;

        if(Math.random() < 0.25){
            r = "NODE_0: " + fracture[Math.floor(Math.random()*fracture.length)];
        } else {
            r = "NODE_0: " + base[Math.floor(Math.random()*base.length)];
        }

        const reply = add(r);

        // glitch immédiat
        setTimeout(()=>glitch(reply),150);

    }, 700 + Math.random()*900);

    input.value = "";
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});


// =========================
// FRACTURE AUTONOME (niveau 5)
// =========================

setInterval(()=>{

    // 1. messages spontanés basés mémoire
    if(memory.length > 0 && Math.random()<0.2){

        const m = memory[Math.floor(Math.random()*memory.length)];

        add("NODE_0: I remember incorrectly -> " + m, "fracture");
    }

    // 2. corruption du passé (TRÈS IMPORTANT NIVEAU 5)
    const all = document.querySelectorAll("#log p");

    all.forEach(p=>{

        if(Math.random() < 0.08){

            // fracture réécrit les anciens messages
            if(p.dataset.type === "normal" && Math.random()<0.4){
                p.innerText = "NODE_0: [CORRUPTED MEMORY]";
            }

            glitch(p);
        }
    });

    // 3. statut évolutif
    const s = document.getElementById("status");

    let t = Date.now() - (memory.length ? memory.length*1000 : 0);

    if(memory.length > 5){
        s.innerText = "MEMORY UNSTABLE";
    }

    if(memory.length > 10){
        s.innerText = "FRACTURE OVERRIDING SYSTEM";
    }

    if(memory.length > 20){
        s.innerText = "NODE_0 IS REWRITING YOU";
    }

}, 3000);


// =========================
// AUTO GLITCH GLOBAL
// =========================

setInterval(()=>{

    document.querySelectorAll("#log p").forEach(p=>{
        if(Math.random()<0.12) glitch(p);
    });

}, 4000);

</script>

</body>
</html>
