<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background-color: #0d0d0d;
    color: #00ff9f;
    font-family: monospace;
    padding: 40px;
}

.glitch {
    display: inline-block;
}

#container {
    max-width: 700px;
}

#timer {
    font-size: 20px;
    margin-top: 10px;
}

#status {
    margin-top: 10px;
}

#log {
    margin-top: 20px;
    opacity: 0.85;
    line-height: 1.5;
}

img {
    margin-top: 20px;
    width: 320px;
    opacity: 0.9;
    border: 1px solid #00ff9f33;
}
</style>
</head>

<body>

<div id="container">

<h1 class="glitch" id="title">NODE_0</h1>

<p id="status">SYSTEM READY</p>

<p id="timer">01:00:00</p>

<img src="fracture.png" id="fracture" alt="fracture">

<div id="log"></div>

</div>

<script>
// =======================
// GLITCH ENGINE (SAFE V2)
// =======================

const symbols = ["█", "#", "%", "&", "@", "Ø", "Ξ", "Δ"];

function r(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function glitchText(el, intensity = 0.2) {
    if (!el) return;

    const original = el.dataset.original || el.innerText;
    el.dataset.original = original;

    let out = "";

    for (let i = 0; i < original.length; i++) {
        if (Math.random() < intensity && original[i] !== " ") {
            out += r(symbols);
        } else {
            out += original[i];
        }
    }

    el.innerText = out;

    setTimeout(() => {
        el.innerText = original;
    }, 80 + Math.random() * 120);
}

// =======================
// TIMER RÉEL (IMPORTANT)
// =======================

// 1h countdown (réel)
let totalSeconds = 60 * 60;

function updateTimer() {
    let h = Math.floor(totalSeconds / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;

    document.getElementById("timer").innerText =
        String(h).padStart(2,"0") + ":" +
        String(m).padStart(2,"0") + ":" +
        String(s).padStart(2,"0");

    if (totalSeconds > 0) totalSeconds--;
}

setInterval(updateTimer, 1000);

// =======================
// NODE_0 LORE RESTAURÉ
// =======================

const log = document.getElementById("log");

const messages = [
    "NODE_0 // sleep state active",
    "fracture integrity: stable",
    "memory loop engaged",
    "no external interference detected",
    "system breathing... slow",
    "waiting for anomaly"
];

const glitches = [
    "H",
    "HE",
    "HEL",
    "HELP",
    "DON'T TRUST NODE_1",
    "IT IS NOT SLEEPING",
    "fracture.signal.detected",
    "I REMEMBER YOU"
];

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 10){
        log.removeChild(log.children[0]);
    }
}

// =======================
// LOOP PRINCIPAL
// =======================

setInterval(() => {

    // logs normaux
    if(Math.random() < 0.6){
        add(r(messages));
    }

    // intrusion
    if(Math.random() < 0.2){
        add(r(glitches));
    }

    // glitch visuel
    if(Math.random() < 0.5){
        glitchText(document.getElementById("title"), 0.12);
        glitchText(document.getElementById("status"), 0.18);
    }

}, 2500);

</script>

</body>
</html>
