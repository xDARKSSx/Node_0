<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    margin:0;
    display:flex;
    justify-content:center;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    line-height:1.6;
    opacity:0.85;
    max-height:420px;
    overflow-y:auto;
}

input, button {
    width:100%;
    margin-top:10px;
    background:#000;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    padding:10px;
    font-family:monospace;
    cursor:pointer;
}

#fractureWrap {
    position:relative;
    width:320px;
    margin-top:20px;
}

#fracture {
    width:100%;
    border:1px solid #00ff9f33;
}

#fractureText {
    position:absolute;
    bottom:5px;
    left:5px;
    right:5px;
    font-size:12px;
    color:#ff0033;
    opacity:0;
}
</style>
</head>

<body>

<div id="container">

<h1 id="title">NODE_0</h1>
<p id="status">SYSTEM READY</p>

<div id="fractureWrap">
    <img src="./fracture.png" id="fracture">
    <div id="fractureText"></div>
</div>

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

// =========================
// SAFE INIT
// =========================

const log = document.getElementById("log");
const input = document.getElementById("input");
const btn = document.getElementById("send");
const img = document.getElementById("fracture");
const fractureBox = document.getElementById("fractureText");

let memory = JSON.parse(localStorage.getItem("node0_memory") || "[]");

function save(){
    localStorage.setItem("node0_memory", JSON.stringify(memory.slice(-60)));
}

// =========================
// ADD MESSAGE
// =========================

function add(msg){
    const p = document.createElement("p");
    p.innerText = msg;
    log.appendChild(p);

    if(log.children.length > 60){
        log.removeChild(log.firstChild);
    }
}

// =========================
// GLITCH
// =========================

const sym = ["█","#","%","&","@","Ø","Ξ","Δ","?"];

function glitch(el){
    if(!el) return;

    const base = el.innerText;
    let out = "";

    for(let i=0;i<base.length;i++){
        out += Math.random()<0.2 ? sym[Math.floor(Math.random()*sym.length)] : base[i];
    }

    el.innerText = out;
    setTimeout(()=>el.innerText = base, 180);
}

// =========================
// RESPONSES
// =========================

const base = [
"I am still here.",
"...",
"I hear you.",
"Signal stable."
];

function getResponse(){
    if(memory.length > 0 && Math.random()<0.5){
        return "NODE_0: " + memory[Math.floor(Math.random()*memory.length)];
    }
    return "NODE_0: " + base[Math.floor(Math.random()*base.length)];
}

// =========================
// SEND (FIXÉ 100%)
// =========================

function send(){

    const v = input.value.trim();
    if(!v) return;

    memory.push(v);
    save();

    add("YOU: " + v);

    setTimeout(()=>{
        const p = document.createElement("p");
        p.innerText = getResponse();
        log.appendChild(p);

        if(Math.random()<0.4) glitch(p);

    }, 700);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown",(e)=>{
    if(e.key === "Enter") send();
});

// =========================
// FRACTURE TEXT
// =========================

const fractureLines = [
"i am inside the image",
"you should not look at me",
"NODE_0 is unstable",
"i remember you"
];

// =========================
// MAIN LOOP
// =========================

setInterval(()=>{

    // auto messages
    if(memory.length>0 && Math.random()<0.15){
        add("NODE_0: echo -> " + memory[Math.floor(Math.random()*memory.length)]);
    }

    // glitch logs
    document.querySelectorAll("#log p").forEach(p=>{
        if(Math.random()<0.08) glitch(p);
    });

    // image life
    if(img){
        img.style.opacity = 0.85 + Math.random()*0.2;
        img.style.transform = `translate(${Math.random()*2}px,${Math.random()*2}px)`;
    }

    // fracture speaks
    if(fractureBox && Math.random()<0.25){
        fractureBox.innerText = fractureLines[Math.floor(Math.random()*fractureLines.length)];
        fractureBox.style.opacity = 1;

        setTimeout(()=>fractureBox.style.opacity = 0, 1200);
    }

    // status
    const s = document.getElementById("status");
    if(memory.length > 5) s.innerText = "SYSTEM UNSTABLE";
    if(memory.length > 10) s.innerText = "FRACTURE ACTIVE";

}, 1200);

});

</script>

</body>
</html>
