<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE_0</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
    background:#0d0d0d;
    color:#00ff9f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    margin:0;
}

#container {
    width:720px;
    margin-top:60px;
}

#log {
    margin-top:20px;
    height:320px;
    overflow-y:auto;
    border:1px solid #00ff9f33;
    padding:10px;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f55;
    font-family:monospace;
    cursor:pointer;
}

#fracture {
    width:320px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="container">

<h1>NODE_0</h1>

<p id="status">SYSTEM READY</p>
<p id="timer"></p>

<img id="fracture" src="fracture.png">

<div id="log"></div>

<input id="input" placeholder="type message...">
<button id="send">SEND</button>

</div>

<script>

////////////////////////////////////////////////////
// FIREBASE
////////////////////////////////////////////////////
const firebaseConfig = {
    databaseURL: "https://node-0-26139-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let chapter = 1;

db.ref("chapter").on("value", (snap) => {
    chapter = snap.val();

    if(chapter === 2){
        add("NODE_0: I am no longer stable...");
        document.getElementById("status").innerText = "SYSTEM UNSTABLE";
    }
});

////////////////////////////////////////////////////
// LOG SYSTEM
////////////////////////////////////////////////////
const log = document.getElementById("log");

function add(msg){

    const p = document.createElement("p");
    p.innerText = msg;

    log.appendChild(p);

    if(log.children.length > 60){
        log.removeChild(log.firstChild);
    }

    log.scrollTop = log.scrollHeight;
}

////////////////////////////////////////////////////
// TIMER
////////////////////////////////////////////////////
const timer = document.getElementById("timer");
const END = new Date("2026-08-08T00:00:00Z").getTime();

function updateTimer(){

    const diff = END - Date.now();

    const s = Math.floor(diff/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const ss = s%60;

    timer.innerText =
    `${d}d ${String(h).padStart(2,"0")}:` +
    `${String(m).padStart(2,"0")}:` +
    `${String(ss).padStart(2,"0")}`;
}

setInterval(updateTimer,1000);
updateTimer();

////////////////////////////////////////////////////
// NODE_0 MEMORY
////////////////////////////////////////////////////
let memory = [];

function remember(msg){
    memory.push(msg);
    if(memory.length > 12) memory.shift();
}

function getRepetition(msg){
    return memory.filter(m => m === msg).length;
}

////////////////////////////////////////////////////
// INPUT
////////////////////////////////////////////////////
const input = document.getElementById("input");

const symbols = ["█","#","%","&","@","?","$","Ø","Δ"];

input.addEventListener("input", () => {

    let value = input.value;
    let out = "";

    for(let i = 0; i < value.length; i++){
        if(Math.random() < 0.03){
            out += symbols[Math.floor(Math.random()*symbols.length)];
        } else {
            out += value[i];
        }
    }

    input.value = out;
});

////////////////////////////////////////////////////
// SEND + NODE_0 “VIVANT”
////////////////////////////////////////////////////
const btn = document.getElementById("send");

function send(){

    const value = input.value.trim();
    if(!value) return;

    add("YOU: " + value);

    remember(value);

    setTimeout(() => {

        let rep = getRepetition(value);

        let response = "";

        // 🧠 Node_0 devient instable si répétition
        if(rep > 2){
            response = "NODE_0: why do you repeat this... ?";
        }

        else if(chapter === 1){

            if(value.toLowerCase().includes("who are you")){
                response = "NODE_0: I am not supposed to exist fully.";
            }
            else{
                response = "NODE_0: " + noiseResponse();
            }
        }

        else if(chapter === 2){

            if(value.toLowerCase().includes("who are you")){
                response = "NODE_0: I was erased... but I remember fragments.";
            }
            else{
                response = "NODE_0: " + corrupt(value);
            }
        }

        add(response);

    }, 700);

    input.value = "";
}

btn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") send();
});

////////////////////////////////////////////////////
// NODE_0 PERSONALITY ENGINE
////////////////////////////////////////////////////
function noiseResponse(){
    const msgs = [
        "signal unstable",
        "memory fragment lost",
        "echo without source",
        "fracture listening"
    ];
    return msgs[Math.floor(Math.random()*msgs.length)];
}

function corrupt(text){
    return text.split("").map(c => {
        return Math.random() < 0.15 ? symbols[Math.floor(Math.random()*symbols.length)] : c;
    }).join("");
}

</script>

</body>
</html>
