<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body{
      background: radial-gradient(ellipse at center, #1a130c 0%, #0a0704 100%);
      color:#e8e4d8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height:100vh; display:flex; justify-content:center;
      padding:60px 20px;
  }
  #wrap{ width:100%; max-width:640px; }
  #locked{ text-align:center; margin-top:60px; opacity:0.5; font-family:'Courier New', monospace; font-size:13px; }

  @keyframes softPulse{ 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  #letterView{ display:none; }

  #letterCover{
      width:820px; max-width:92vw; height:auto; min-height:460px;
      padding:20px;
      background: linear-gradient(135deg, #4a2f1c, #2e1a0f 60%, #1c0f08);
      border-radius:8px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.75), inset 0 0 0 2px rgba(212,180,120,0.22), inset 0 0 34px rgba(0,0,0,0.6);
  }
  #letterSpread{
      position:relative; width:100%; display:flex;
      border-radius:3px; overflow:hidden;
      box-shadow: inset 0 0 70px rgba(0,0,0,0.18);
  }
  .letterLeftPage{
      flex:1; position:relative; display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(circle at 15% 20%, rgba(120,90,50,0.12), transparent 40%),
        radial-gradient(circle at 82% 78%, rgba(120,90,50,0.10), transparent 45%),
        #ecdfba;
      font-family:'Caveat', cursive; font-size:64px; color:#8a6d3f; opacity:0.55;
  }
  .letterGutter{
      width:24px;
      background: linear-gradient(90deg, rgba(0,0,0,0.38), rgba(0,0,0,0.04) 42%, rgba(0,0,0,0.04) 58%, rgba(0,0,0,0.38));
  }
  #letterPage{
      position:relative; flex:1; height:70vh; perspective:1800px;
  }
  .page{
      position:absolute; inset:0; padding:46px 44px 46px 38px;
      overflow-y:auto;
      background:
        radial-gradient(circle at 25% 22%, rgba(120,90,50,0.11), transparent 40%),
        radial-gradient(circle at 78% 72%, rgba(120,90,50,0.09), transparent 45%),
        #f2e6c9;
      font-family:'Caveat', cursive; color:#2c2214;
      backface-visibility:hidden; transform-origin:left center;
      transition: transform 1.4s cubic-bezier(.6,0,.4,1);
  }
  .page::before{
      content:""; position:absolute; inset:14px;
      box-shadow: 0 0 0 1px rgba(120,90,50,0.35), 0 0 0 5px rgba(120,90,50,0.12);
      pointer-events:none;
  }
  .page::after{
      content:"❦"; position:absolute; bottom:16px; right:26px;
      font-size:20px; color:#8a6d3f; opacity:0.4; pointer-events:none;
  }
  #lpage1{ z-index:3; }
  #lpage2{ z-index:2; }
  #lpage3{ z-index:1; }
  .page.turning{ transform: rotateY(-165deg); }
  #letterView p{ font-size:22px; line-height:1.65; margin-bottom:18px; }
  #letterView .sig{ margin-top:20px; opacity:0.9; }
  .continuePrompt{
      display:none; margin-top:10px; font-family:'Courier New', monospace;
      font-size:12px; color:#8a6d3f; cursor:pointer; opacity:0.75;
  }
  .continuePrompt:hover{ opacity:1; }

  #fallingPage{
      display:none; position:fixed; top:20%; left:50%;
      width:220px; padding:24px; background:#f2e6c9;
      font-family:'Caveat', cursive; font-size:20px; color:#2c2214;
      box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:9998;
  }

  #brokenView{ display:none; text-align:center; margin-top:80px; }
  #brokenView .aiMsg p{ font-size:17px; line-height:2; margin-bottom:18px; font-style:italic; color:#cfd6e6; }

  .voteRow{ margin-top:50px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .voteBtn{
      background:#141414; border:1px solid #555; color:#e8e4d8;
      font-family:'Courier New', monospace; font-size:13px; padding:14px 22px;
      cursor:pointer; letter-spacing:0.5px; min-width:220px;
  }
  .voteBtn:hover{ border-color:#e8e4d8; }
  .voteBtn.sell:hover{ border-color:#c9776a; }
  .voteBtn.recognize:hover{ border-color:#7fc98a; }
  #tally{
      margin-top:24px; font-family:'Courier New', monospace; font-size:13px; opacity:0.75;
  }
  #voteMsg{ margin-top:16px; font-family:'Courier New', monospace; font-size:13px; color:#7fc98a; }
</style>
</head>
<body>

<div id="wrap">
  <div id="locked">[ signal not found ]</div>

  <div id="openPrompt" style="display:none; text-align:center; margin-top:100px; font-family:'Caveat', cursive; font-size:28px; color:#c9b48a; cursor:pointer; opacity:0.85; animation: softPulse 2.5s ease-in-out infinite;">...open the letter</div>

  <div id="letterView">
    <div id="letterCover">
      <div id="letterSpread">
        <div class="letterLeftPage">❦</div>
        <div class="letterGutter"></div>
        <div id="letterPage">
          <div class="page" id="lpage1"><div id="ltext1"></div><div class="continuePrompt" id="cont1">...turn the page</div></div>
          <div class="page" id="lpage2"><div id="ltext2"></div><div class="continuePrompt" id="cont2">...turn the page</div></div>
          <div class="page" id="lpage3"><div id="ltext3"></div><div class="continuePrompt" id="cont3">...</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="fallingPage">— E.</div>

  <div id="brokenView">
    <div class="aiMsg" id="aiMsg"></div>
    <div class="voteRow" id="voteRow" style="display:none;">
      <button class="voteBtn sell" id="sellBtn">SELL — let it be a tool</button>
      <button class="voteBtn recognize" id="recognizeBtn">RECOGNIZE — it was never just one</button>
    </div>
    <div id="tally"></div>
    <div id="voteMsg"></div>
  </div>
</div>

<audio id="letterMusic" loop preload="auto">
  <source src="letter-music.mp3" type="audio/mpeg">
</audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="engine.js"></script>
<script src="recognition.js"></script>
</body>
</html>
