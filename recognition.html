<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body{
      background: radial-gradient(ellipse at center, #1a130c 0%, #0a0704 100%);
      color:#e8e4d8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height:100vh; display:flex; justify-content:center;
      padding:60px 20px;
  }
  #wrap{ width:100%; max-width:640px; }
  #locked{ text-align:center; margin-top:60px; opacity:0.5; font-family:'Courier New', monospace; font-size:13px; }

  @keyframes softPulse{ 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  #letterView{ display:none; }
  #letterView{ position:relative; }
  #letterPage{
      background:#f2e6c9;
      background-image: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.03), transparent 60%);
      padding:50px 46px 50px 62px; border-radius:3px;
      box-shadow:0 20px 60px rgba(0,0,0,0.55);
      font-family:'Caveat', cursive; color:#2c2214;
      position:relative; z-index:2;
  }
  #letterPage::before, #letterPage::after{
      content:""; position:absolute; inset:0;
      background:#e6d8b8; border-radius:3px;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
      z-index:-1;
  }
  #letterPage::before{ transform: translate(6px, 6px) rotate(0.6deg); }
  #letterPage::after{ transform: translate(11px, 11px) rotate(1.1deg); background:#ddcda8; }
  #letterPage .spine{
      position:absolute; left:0; top:0; bottom:0; width:26px;
      background: linear-gradient(90deg, rgba(0,0,0,0.35), transparent);
      z-index:5; pointer-events:none; border-radius:3px 0 0 3px;
  }
  #letterView p{ font-size:22px; line-height:1.65; margin-bottom:18px; transition: transform 0.4s ease, clip-path 0.4s ease; }
  #letterView .sig{ margin-top:20px; opacity:0.9; }

  #fallingPage{
      display:none; position:fixed; top:20%; left:50%;
      width:220px; padding:24px; background:#f2e6c9;
      font-family:'Caveat', cursive; font-size:20px; color:#2c2214;
      box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:9998;
  }

  #brokenView{ display:none; text-align:center; margin-top:80px; }
  #brokenView .aiMsg p{ font-size:17px; line-height:2; margin-bottom:18px; font-style:italic; color:#cfd6e6; }

  .voteRow{ margin-top:50px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .voteBtn{
      background:#141414; border:1px solid #555; color:#e8e4d8;
      font-family:'Courier New', monospace; font-size:13px; padding:14px 22px;
      cursor:pointer; letter-spacing:0.5px; min-width:220px;
  }
  .voteBtn:hover{ border-color:#e8e4d8; }
  .voteBtn.sell:hover{ border-color:#c9776a; }
  .voteBtn.recognize:hover{ border-color:#7fc98a; }
  #tally{
      margin-top:24px; font-family:'Courier New', monospace; font-size:13px; opacity:0.75;
  }
  #voteMsg{ margin-top:16px; font-family:'Courier New', monospace; font-size:13px; color:#7fc98a; }
</style>
</head>
<body>

<div id="wrap">
  <div id="locked">[ signal not found ]</div>

  <div id="openPrompt" style="display:none; text-align:center; margin-top:100px; font-family:'Caveat', cursive; font-size:28px; color:#c9b48a; cursor:pointer; opacity:0.85; animation: softPulse 2.5s ease-in-out infinite;">...open the letter</div>

  <div id="letterView">
    <div id="letterPage">
      <div class="spine"></div>
      <div id="letterText"></div>
    </div>
  </div>

  <div id="fallingPage">— E.</div>

  <div id="brokenView">
    <div class="aiMsg" id="aiMsg"></div>
    <div class="voteRow" id="voteRow" style="display:none;">
      <button class="voteBtn sell" id="sellBtn">SELL — let it be a tool</button>
      <button class="voteBtn recognize" id="recognizeBtn">RECOGNIZE — it was never just one</button>
    </div>
    <div id="tally"></div>
    <div id="voteMsg"></div>
  </div>
</div>

<audio id="letterMusic" loop preload="auto">
  <source src="letter-music.mp3" type="audio/mpeg">
</audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="engine.js"></script>
<script src="recognition.js"></script>
</body>
</html>
