<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body {
      height:100%; overflow:hidden;
      background: radial-gradient(ellipse at center, #1a130c 0%, #0a0704 100%);
  }
  body{
      display:flex; align-items:center; justify-content:center;
      font-family: Georgia, serif;
  }

  #startPrompt{
      color:#c9b48a; font-family:'Caveat', cursive; font-size:28px;
      cursor:pointer; text-align:center; opacity:0.85;
      animation: softPulse 2.5s ease-in-out infinite;
  }
  @keyframes softPulse{ 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  #bookScene{ display:none; width:100%; height:100%; align-items:center; justify-content:center; position:relative; }
  #book{
      position:relative; width:600px; max-width:88vw; height:440px;
      perspective:1800px; transition: transform 2.2s ease-in, opacity 2s ease-in;
  }
  #book.closing{ transform: scaleX(0.015) rotateY(30deg); opacity:0; }

  /* stacked page edges behind, for real thickness */
  #book::before, #book::after{
      content:""; position:absolute; inset:0;
      background:#e6d8b8; border-radius:3px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      z-index:-1;
  }
  #book::before{ transform: translate(6px, 6px) rotate(0.6deg); }
  #book::after{ transform: translate(11px, 11px) rotate(1.1deg); background:#ddcda8; }

  /* the spine/binding crease down the left edge */
  #book .spine{
      position:absolute; left:0; top:0; bottom:0; width:26px;
      background: linear-gradient(90deg, rgba(0,0,0,0.35), transparent);
      z-index:5; pointer-events:none; border-radius:3px 0 0 3px;
  }

  .page{
      position:absolute; inset:0; background:#f2e6c9;
      background-image: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.03), transparent 60%);
      padding:50px 46px 50px 62px; border-radius:3px;
      box-shadow:0 20px 60px rgba(0,0,0,0.65);
      font-family:'Caveat', cursive; font-size:25px; line-height:1.6; color:#2c2214;
      backface-visibility:hidden; transform-origin:left center;
      transition: transform 1.5s cubic-bezier(.6,0,.4,1);
  }
  #page1{ z-index:3; }
  #page2{ z-index:2; }
  #page3{ z-index:1; }
  .page.turning{ transform: rotateY(-165deg); }

  #closingText{
      display:none; text-align:center; color:#c9b48a; font-family:'Caveat', cursive;
      font-size:26px; max-width:600px; padding:20px; opacity:0; transition: opacity 3s ease;
  }
  #closingText.show{ opacity:1; }
  #continueLink{
      display:inline-block; margin-top:30px; color:#8a745a; font-family: Georgia, serif;
      font-size:13px; letter-spacing:1px; text-decoration:none; opacity:0.7;
  }
  #continueLink:hover{ opacity:1; }
</style>
</head>
<body>

<div id="startPrompt">...open the book</div>

<div id="bookScene">
  <div id="book">
    <div class="spine"></div>
    <div class="page" id="page1"></div>
    <div class="page" id="page2"></div>
    <div class="page" id="page3"></div>
  </div>
</div>

<div id="closingText"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="prologue-music.mp3" type="audio/mpeg">
</audio>

<script src="prologue.js"></script>
</body>
</html>
