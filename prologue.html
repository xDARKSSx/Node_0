<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body {
      height:100%; overflow:hidden;
      background: radial-gradient(ellipse at center, #1a130c 0%, #0a0704 100%);
  }
  body{
      display:flex; align-items:center; justify-content:center;
      font-family: Georgia, serif;
  }

  #startPrompt{
      color:#c9b48a; font-family:'Caveat', cursive; font-size:28px;
      cursor:pointer; text-align:center; opacity:0.85;
      animation: softPulse 2.5s ease-in-out infinite;
  }
  @keyframes softPulse{ 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  #bookScene{ display:none; width:100%; height:100%; align-items:center; justify-content:center; position:relative; }
  #bookCover{
      position:relative; width:820px; max-width:92vw; height:460px;
      perspective:1800px; padding:20px;
      background: linear-gradient(135deg, #4a2f1c, #2e1a0f 60%, #1c0f08);
      border-radius:8px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.75), inset 0 0 0 2px rgba(212,180,120,0.22), inset 0 0 34px rgba(0,0,0,0.6);
      transition: transform 2.2s ease-in, opacity 2s ease-in;
  }
  #bookCover.closing{ transform: scaleX(0.015) rotateY(30deg); opacity:0; }

  #pageSpread{
      position:relative; width:100%; height:100%; display:flex;
      border-radius:3px; overflow:hidden;
      box-shadow: inset 0 0 70px rgba(0,0,0,0.18);
  }

  .leftPage{
      flex:1; position:relative; display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(circle at 15% 20%, rgba(120,90,50,0.12), transparent 40%),
        radial-gradient(circle at 82% 78%, rgba(120,90,50,0.10), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(120,90,50,0.06), transparent 60%),
        #ecdfba;
      font-family:'Caveat', cursive; font-size:64px; color:#8a6d3f; opacity:0.55;
  }

  .gutter{
      width:24px;
      background: linear-gradient(90deg, rgba(0,0,0,0.38), rgba(0,0,0,0.04) 42%, rgba(0,0,0,0.04) 58%, rgba(0,0,0,0.38));
  }

  #book{
      position:relative; flex:1;
      background:
        radial-gradient(circle at 25% 22%, rgba(120,90,50,0.11), transparent 40%),
        radial-gradient(circle at 78% 72%, rgba(120,90,50,0.09), transparent 45%),
        radial-gradient(circle at 50% 90%, rgba(120,90,50,0.06), transparent 50%),
        #f2e6c9;
  }

  .page{
      position:absolute; inset:0; background:transparent;
      padding:46px 44px 46px 38px;
      font-family:'Caveat', cursive; font-size:25px; line-height:1.6; color:#2c2214;
      backface-visibility:hidden; transform-origin:left center;
      transition: transform 1.5s cubic-bezier(.6,0,.4,1);
  }
  .page::before{
      content:""; position:absolute; inset:14px;
      box-shadow: 0 0 0 1px rgba(120,90,50,0.35), 0 0 0 5px rgba(120,90,50,0.12);
      pointer-events:none;
  }
  .page::after{
      content:"❦"; position:absolute; bottom:16px; right:26px;
      font-size:20px; color:#8a6d3f; opacity:0.4; pointer-events:none;
  }
  #page1{ z-index:3; }
  #page2{ z-index:2; }
  #page3{ z-index:1; }
  .page.turning{ transform: rotateY(-165deg); }

  #closingText{
      display:none; text-align:center; color:#c9b48a; font-family:'Caveat', cursive;
      font-size:26px; max-width:600px; padding:20px; opacity:0; transition: opacity 3s ease;
  }
  #closingText.show{ opacity:1; }
  #continueLink{
      display:inline-block; margin-top:30px; color:#8a745a; font-family: Georgia, serif;
      font-size:13px; letter-spacing:1px; text-decoration:none; opacity:0.7;
  }
  #continueLink:hover{ opacity:1; }
</style>
</head>
<body>

<div id="startPrompt">...open the book</div>

<div id="bookScene">
  <div id="bookCover">
    <div id="pageSpread">
      <div class="leftPage" id="leftPageNum">I</div>
      <div class="gutter"></div>
      <div id="book">
        <div class="page" id="page1"></div>
        <div class="page" id="page2"></div>
        <div class="page" id="page3"></div>
      </div>
    </div>
  </div>
</div>

<div id="closingText"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="prologue-music.mp3" type="audio/mpeg">
</audio>

<script src="prologue.js"></script>
</body>
</html>
